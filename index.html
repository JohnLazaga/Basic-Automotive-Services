<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<meta name="theme-color" content="#F21717">
<title>Basic by JMSI — Shop Operations</title>
<!-- Warm up connections to Google so the SDK + auth/data calls start sooner -->
<link rel="preconnect" href="https://www.gstatic.com" crossorigin>
<link rel="preconnect" href="https://firestore.googleapis.com">
<link rel="preconnect" href="https://identitytoolkit.googleapis.com">
<style>/* ============================================================================
   BASIC by JMSI — Design system (Apple-clean). Brand red #F21717 / gold #FFC000
   ========================================================================== */
:root{
  --disp:-apple-system,BlinkMacSystemFont,'SF Pro Display','SF Pro Text','Segoe UI',Roboto,system-ui,sans-serif;
  --brand:#F21717; --brand-dark:#CC0F0F; --brand-tint:rgba(242,23,23,.08); --gold:#FFC000;
  --canvas:#F5F5F7; --panel:#ffffff; --hair:#E5E5EA; --ink:#1D1D1F; --ink2:#6E6E73;
  --r-card:18px; --r-btn:11px; --r-modal:22px;
  --sh-1:0 1px 2px rgba(0,0,0,.04),0 4px 16px rgba(0,0,0,.05);
  --sh-2:0 8px 40px rgba(0,0,0,.12);
}
*{box-sizing:border-box}
html,body{margin:0;padding:0}
body{font-family:var(--disp);background:var(--canvas);color:var(--ink);font-size:14.5px;line-height:1.5;-webkit-font-smoothing:antialiased}
#app{display:flex;min-height:100vh}
a{color:var(--brand);text-decoration:none;cursor:pointer}
h1{font-size:26px;font-weight:800;letter-spacing:-.02em;margin:0}
h2{font-size:16px;font-weight:700;letter-spacing:-.01em;margin:0 0 10px}
.muted{color:var(--ink2)} .small{font-size:12.5px} .center{text-align:center}
.r{text-align:right} .amber{color:#b8860b;font-weight:600}
.mt8{margin-top:8px}.mb8{margin-bottom:8px}.full{width:100%}.mono{font-family:ui-monospace,Menlo,Consolas,monospace}

/* ---- Sidebar (dark rail, hosts the brand lockup natively) ---- */
:root{ --side:#181818; --side-2:#202022; --side-ink:#f5f5f7; --side-ink2:#9a9a9f; --side-hair:rgba(255,255,255,.08); }
.sidebar{width:252px;flex:0 0 252px;background:var(--side);border-right:1px solid #000;
  padding:0 12px 14px;display:flex;flex-direction:column;position:sticky;top:0;height:100vh;overflow-y:auto}
.brandlock{padding:22px 8px 18px;margin-bottom:4px}
.brandlock .lockup{width:100%;max-width:188px;height:auto;display:block}
.brandsub{font-size:10.5px;font-weight:600;letter-spacing:.04em;color:var(--side-ink2);margin-top:10px;padding-left:2px}
.navwrap{display:flex;flex-direction:column;gap:2px}
.nav-group{margin-bottom:18px}
.nav-title{font-size:10px;font-weight:700;letter-spacing:.1em;color:var(--side-ink2);padding:0 10px 7px;opacity:.8}
.nav{display:flex;align-items:center;gap:11px;width:100%;border:0;background:transparent;color:var(--side-ink);
  font:inherit;font-size:13.5px;font-weight:500;text-align:left;padding:8px 11px;border-radius:9px;cursor:pointer;margin-bottom:1px;transition:background .15s,color .15s}
.nav:hover{background:var(--side-2);color:#fff}
.nav.active{background:var(--brand);color:#fff;font-weight:600;box-shadow:0 2px 10px rgba(242,23,23,.35)}
.nav-i{width:18px;text-align:center;opacity:.7}
.nav.active .nav-i{opacity:1}
.sidefoot{margin-top:auto;font-size:10px;letter-spacing:.03em;color:var(--side-ink2);padding:12px 10px 4px;opacity:.7}

/* ---- Main / topbar ---- */
.main{flex:1;min-width:0;display:flex;flex-direction:column}
.topbar{position:sticky;top:0;z-index:20;display:flex;align-items:center;gap:14px;
  padding:12px 26px;background:rgba(255,255,255,.72);backdrop-filter:saturate(180%) blur(20px);
  -webkit-backdrop-filter:saturate(180%) blur(20px);border-bottom:1px solid var(--hair)}
.tb-title{font-weight:700;font-size:15px}
.tb-right{margin-left:auto;display:flex;align-items:center;gap:14px}
.tb-stat{font-size:12.5px;color:var(--ink2);background:var(--canvas);padding:3px 10px;border-radius:20px}
.savestate{font-size:12px;color:var(--ink2)} .savestate[data-st=saving]{color:var(--brand)}
.iconbtn{border:1px solid var(--hair);background:var(--panel);width:31px;height:31px;border-radius:9px;cursor:pointer;font-size:14px;color:var(--ink);display:inline-flex;align-items:center;justify-content:center;line-height:1;transition:background .15s,transform .06s}
.iconbtn:hover{background:var(--brand-tint)} .iconbtn:active{transform:scale(.94)}
.hamburger{display:none;border:0;background:transparent;font-size:20px;cursor:pointer}
.content{padding:26px;max-width:1280px;width:100%;margin:0 auto}

/* ---- Page header ---- */
.page-head{display:flex;align-items:center;justify-content:space-between;gap:16px;margin-bottom:18px;flex-wrap:wrap}
.back{font-size:12.5px;color:var(--ink2);display:block;margin-bottom:4px}
.sec{margin:22px 0 12px}
.row{display:flex;align-items:center}.gap{gap:8px}.row.gap{flex-wrap:wrap}

/* ---- Buttons ---- */
.btn{font:inherit;font-weight:600;font-size:13.5px;border:1px solid var(--hair);background:#fff;color:var(--ink);
  padding:9px 16px;border-radius:var(--r-btn);cursor:pointer;transition:transform .06s,box-shadow .15s,background .15s;display:inline-flex;align-items:center;gap:6px}
.btn:hover{box-shadow:var(--sh-1)} .btn:active{transform:scale(.98)}
.btn.primary{background:var(--brand);border-color:var(--brand);color:#fff}
.btn.primary:hover{background:var(--brand-dark)}
.btn.ghost{background:#fff} .btn.danger{background:#fff;border-color:#f3b5b5;color:var(--brand-dark)}
.btn.danger:hover{background:#fff5f5} .btn.sm{padding:6px 12px;font-size:12.5px}
.btn.xs{padding:4px 9px;font-size:11.5px;border-radius:8px} .btn:disabled{opacity:.45;cursor:not-allowed}
.btn.full{width:100%;justify-content:center}
.ic{border:0;background:transparent;cursor:pointer;color:var(--ink2);font-size:13px;padding:3px 5px;border-radius:6px}
.ic:hover{background:var(--brand-tint);color:var(--brand)}

/* ---- Segmented control ---- */
.seg{display:inline-flex;background:var(--canvas);border-radius:10px;padding:3px;gap:2px}
.seg-b{border:0;background:transparent;font:inherit;font-weight:600;font-size:13px;padding:6px 14px;border-radius:8px;cursor:pointer;color:var(--ink2)}
.seg-b.on{background:#fff;color:var(--ink);box-shadow:var(--sh-1)}

/* ---- Cards ---- */
.card{background:var(--panel);border:1px solid var(--hair);border-radius:var(--r-card);padding:18px;box-shadow:var(--sh-1);margin-bottom:16px}
.card.pad0{padding:0;overflow:hidden} .card-head{display:flex;align-items:center;justify-content:space-between;gap:10px;margin-bottom:12px}
.card-head h2{margin:0}
.cols{display:grid;grid-template-columns:1fr 360px;gap:18px;align-items:start}
.colmain,.colside{min-width:0}
.grid2{display:grid;grid-template-columns:1fr 1fr;gap:10px 16px}
.grid2cards{display:grid;grid-template-columns:1fr 1fr;gap:16px}
.ksmall{display:grid;grid-template-columns:1fr 1fr;gap:6px 18px}

/* ---- KPI ---- */
.kpis{display:grid;grid-template-columns:repeat(auto-fit,minmax(170px,1fr));gap:14px;margin-bottom:18px}
.kpi{background:var(--panel);border:1px solid var(--hair);border-radius:var(--r-card);padding:16px;box-shadow:var(--sh-1)}
.kpi-l{font-size:12px;color:var(--ink2);font-weight:600} .kpi-v{font-size:24px;font-weight:800;letter-spacing:-.02em;margin-top:4px}
.kpi-s{font-size:11.5px;color:var(--ink2);margin-top:2px}

/* ---- Tables ---- */
.tbl{width:100%;border-collapse:collapse;font-size:13.5px}
.tbl th,.tbl td{text-align:left;padding:11px 14px;border-bottom:1px solid var(--hair)}
.tbl th{font-size:11px;text-transform:uppercase;letter-spacing:.04em;color:var(--ink2);font-weight:700;background:#fbfbfd}
.tbl tbody tr:last-child td{border-bottom:0}
.tbl.click tbody tr{cursor:pointer} .tbl.click tbody tr:hover{background:var(--brand-tint)}
.tbl.sm th,.tbl.sm td{padding:7px 10px;font-size:12.5px}

/* ---- Chips / badges ---- */
.chip{display:inline-block;font-size:11.5px;font-weight:600;padding:3px 9px;border-radius:20px;background:var(--canvas);color:var(--ink2)}
.chip.ok{background:#e3f7ea;color:#1a7a3c} .chip.gold{background:#fff6db;color:#9a7400} .chip.due{background:#fdecec;color:var(--brand-dark)}
.sbadge{display:inline-block;font-size:11px;font-weight:800;padding:2px 7px;border-radius:7px;letter-spacing:.02em}
.sbadge.gA{background:#eef1ff;color:#3b48b8} .sbadge.gB{background:#fff6db;color:#9a7400} .sbadge.gC{background:#e3f7ea;color:#1a7a3c}
.lowpill{font-size:10px;font-weight:700;background:#fdecec;color:var(--brand-dark);padding:1px 6px;border-radius:8px}

/* ---- Alert strip ---- */
.alertstrip{display:flex;flex-wrap:wrap;gap:8px;margin-bottom:16px}
.alert{border:1px solid var(--hair);background:#fff;border-radius:20px;padding:6px 13px;font-size:12.5px;font-weight:500;cursor:pointer}
.alert.a-due{background:#fdecec;border-color:#f3b5b5;color:var(--brand-dark)}
.alert.a-soon{background:#fff6db;border-color:#f0d89a;color:#9a7400}
.alert.a-low{background:#fbfbfd;color:var(--ink2)} .alert-more{font-size:12px;color:var(--ink2);align-self:center}

/* ---- Kanban ---- */
.kanban{display:grid;grid-template-columns:repeat(3,1fr);gap:14px}
.kcol{background:var(--canvas);border-radius:14px;padding:10px;min-height:120px}
.kcol-head{display:flex;align-items:center;gap:8px;font-size:13px;font-weight:600;padding:4px 6px 10px}
.kcount{margin-left:auto;background:#fff;border-radius:20px;padding:1px 9px;font-size:12px;color:var(--ink2)}
.jcard{background:#fff;border:1px solid var(--hair);border-radius:13px;padding:11px;margin-bottom:9px;cursor:pointer;box-shadow:var(--sh-1)}
.jcard:hover{border-color:var(--brand)} .jcard-top{display:flex;align-items:center;gap:7px}
.jcard .plate{font-weight:700} .duedot{margin-left:auto;color:var(--gold);font-size:15px}
.jcard-veh{font-size:13px;margin:5px 0 2px} .jcard-meta{display:flex;justify-content:space-between;font-size:11.5px;color:var(--ink2)}
.jcard-foot{display:flex;justify-content:space-between;margin-top:7px;font-size:12px} .jcard-foot .bill{font-weight:700}

/* ---- Bay grid ---- */
.baygrid{display:grid;grid-template-columns:repeat(auto-fill,minmax(190px,1fr));gap:14px}
.baycell{background:#fff;border:1px solid var(--hair);border-radius:14px;padding:12px;min-height:96px;box-shadow:var(--sh-1)}
.baycell.nobay{background:var(--canvas)} .bay-name{font-size:12px;font-weight:700;color:var(--ink2);margin-bottom:8px}
.bay-car{background:var(--brand-tint);border-radius:10px;padding:8px;font-size:13px;font-weight:600;cursor:pointer;margin-bottom:6px}
.bay-car:hover{background:#fdd}.bay-empty{color:var(--ink2);font-size:12.5px;text-align:center;padding:14px 0}

/* ---- Calendar ---- */
.cal-month{font-size:18px;font-weight:700;margin-bottom:10px}
.cal-grid{display:grid;grid-template-columns:repeat(7,1fr)}
.cal-dow{font-size:11px;font-weight:700;color:var(--ink2);text-align:center;padding:8px;text-transform:uppercase;letter-spacing:.03em;border-bottom:1px solid var(--hair)}
.cal-cell{min-height:92px;border-right:1px solid var(--hair);border-bottom:1px solid var(--hair);padding:5px;cursor:pointer;position:relative}
.cal-cell:nth-child(7n){border-right:0} .cal-cell:hover{background:var(--brand-tint)} .cal-cell.empty{background:#fbfbfd;cursor:default}
.cal-cell.today{background:#fffaf0} .cal-d{font-size:12px;font-weight:600;color:var(--ink2)}
.cal-chip{font-size:10.5px;color:#fff;border-radius:5px;padding:1px 5px;margin-top:3px;overflow:hidden;white-space:nowrap;text-overflow:ellipsis}
.cal-more{font-size:10px;color:var(--ink2);margin-top:2px}
.up-row{display:flex;align-items:center;justify-content:space-between;gap:10px;padding:9px 0;border-bottom:1px solid var(--hair);flex-wrap:wrap}
.up-row:last-child{border-bottom:0} .up-act{display:flex;gap:6px;align-items:center}

/* ---- Forms ---- */
.fld{display:block;margin-bottom:11px} .fld-l{display:block;font-size:12px;font-weight:600;color:var(--ink2);margin-bottom:4px}
.fld-h{display:block;font-size:11px;color:var(--ink2);margin-top:3px}
input,select,textarea{font:inherit;font-size:13.5px;width:100%;padding:9px 11px;border:1px solid var(--hair);border-radius:9px;background:#fff;color:var(--ink)}
input:focus,select:focus,textarea:focus{outline:none;border-color:var(--brand);box-shadow:0 0 0 3px var(--brand-tint)}
textarea{resize:vertical} .chk{display:flex;align-items:center;gap:8px;font-size:13px;margin:6px 0;cursor:pointer}
.chk input{width:auto} .chk.small{font-size:12.5px}

/* ---- Stepper ---- */
.stepper{display:flex;align-items:center;gap:4px;margin-bottom:18px;flex-wrap:wrap}
.step{display:flex;align-items:center;gap:7px;font-size:12.5px;color:var(--ink2);font-weight:600}
.step .dot{width:22px;height:22px;border-radius:50%;background:var(--canvas);display:flex;align-items:center;justify-content:center;font-size:11px;border:1px solid var(--hair)}
.step.done .dot{background:#1a7a3c;color:#fff;border-color:#1a7a3c} .step.done{color:var(--ink)}
.step.cur .dot{background:var(--brand);color:#fff;border-color:var(--brand)} .step.cur{color:var(--ink)}
.step-line{flex:1;height:1px;background:var(--hair);min-width:14px}

/* ---- Job detail panels ---- */
.curstat{font-size:13px;margin-bottom:10px} .due-banner{background:#fff6db;border-radius:9px;padding:7px 11px;font-size:12.5px;margin-bottom:10px}
.log{display:flex;flex-direction:column;gap:2px} .log-row{display:flex;gap:10px;padding:8px 0;border-bottom:1px solid var(--hair)}
.log-row:last-child{border-bottom:0} .log-body{flex:1} .log-note{font-size:13px} .log-meta{font-size:11.5px;color:var(--ink2)}
.kv{display:flex;justify-content:space-between;gap:10px;font-size:12.5px;padding:3px 0} .kv-k{color:var(--ink2)} .kv-v{font-weight:600;text-align:right}
.notes{margin-top:10px} .notes p{margin:4px 0 0;font-size:13px}
.addl-row{display:flex;justify-content:space-between;align-items:center;gap:10px;padding:8px 0;border-bottom:1px solid var(--hair)}
.addl-row:last-child{border-bottom:0}
.checklist{margin-top:10px} .cl-title{font-size:12px;font-weight:700;color:var(--ink2);margin:6px 0} .cl-items{display:grid;grid-template-columns:1fr 1fr;gap:2px}
.mechbox{display:flex;flex-direction:column;gap:2px;background:var(--canvas);border-radius:9px;padding:8px}

/* ---- Bill card ---- */
.billcard .l2,.bill-mini .l2,.estsum .l2{display:flex;justify-content:space-between;font-size:13px;padding:4px 0}
.l2.disc span:last-child{color:var(--brand-dark)} .l2.tot{font-weight:800;font-size:14.5px;border-top:1px solid var(--hair);padding-top:7px;margin-top:3px}
.bill-sep{height:1px;background:var(--hair);margin:6px 0} .estsum{margin-top:10px;border-top:1px solid var(--hair);padding-top:8px;max-width:320px;margin-left:auto}
.lock{background:var(--canvas);border-radius:9px;padding:10px;text-align:center;font-size:12.5px;color:var(--ink2);margin:8px 0}
.switch{position:relative;display:inline-block;width:42px;height:24px;vertical-align:middle;cursor:pointer}
.switch input{opacity:0;width:0;height:0;position:absolute}
.switch .track{position:absolute;inset:0;background:var(--hair);border-radius:24px;transition:background .15s}
.switch .knob{position:absolute;top:3px;left:3px;width:18px;height:18px;background:#fff;border-radius:50%;transition:transform .15s;box-shadow:0 1px 2px rgba(0,0,0,.3)}
.switch input:checked + .track{background:var(--brand)}
.switch input:checked + .track .knob{transform:translateX(18px)}
.billedit{border:1px solid var(--hair);border-radius:9px;padding:8px 10px;margin:10px 0;background:var(--canvas)}
.billedit summary{cursor:pointer;font-weight:600;font-size:13px;color:var(--brand)}
.billedit[open]{padding-bottom:10px}
.released{background:#e3f7ea;border-radius:10px;padding:12px;text-align:center;font-weight:700;color:#1a7a3c}

/* ---- Photos ---- */
.thumbs{display:grid;grid-template-columns:repeat(auto-fill,minmax(96px,1fr));gap:8px}
.thumb{position:relative;aspect-ratio:1;border-radius:10px;overflow:hidden;border:1px solid var(--hair)}
.thumb img{width:100%;height:100%;object-fit:cover;cursor:pointer} .thumb-x{position:absolute;top:3px;right:3px;border:0;background:rgba(0,0,0,.55);color:#fff;border-radius:50%;width:20px;height:20px;cursor:pointer;font-size:11px}
.sigpad{border:1px dashed var(--hair);border-radius:9px;background:#fff;touch-action:none;width:100%;max-width:460px}
.sig-show{max-width:240px;border:1px solid var(--hair);border-radius:9px}

/* ---- Bars ---- */
.bars{display:flex;flex-direction:column;gap:9px}
.bar-row{display:grid;grid-template-columns:130px 1fr 90px;align-items:center;gap:10px;font-size:12.5px}
.bar-lab{color:var(--ink2);overflow:hidden;text-overflow:ellipsis;white-space:nowrap} .bar-track{background:var(--canvas);border-radius:20px;height:10px;overflow:hidden}
.bar-fill{height:100%;background:linear-gradient(90deg,var(--brand),var(--gold));border-radius:20px} .bar-val{text-align:right;font-weight:600}

/* ---- Timeline ---- */
.timeline{position:relative;padding-left:6px} .tl-item{display:flex;gap:12px;padding:6px 0}
.tl-dot{width:11px;height:11px;border-radius:50%;background:var(--brand);margin-top:5px;flex:0 0 11px;box-shadow:0 0 0 3px var(--brand-tint)}
.tl-body{flex:1;border-bottom:1px solid var(--hair);padding-bottom:10px} .tl-top{display:flex;align-items:center;gap:8px}
.tl-amt{font-weight:700;font-size:13px;margin-top:2px}
.nextsvc{font-size:16px;font-weight:700} .nextsvc.due{color:var(--brand-dark)} .qrbox{display:flex;justify-content:center;padding:6px}
.qr-fallback{text-align:center} .qr-x{font-size:28px;font-weight:800;color:var(--ink2);letter-spacing:.1em}
.qr-url{display:inline-block;font-size:10.5px;word-break:break-all;background:var(--canvas);padding:4px 7px;border-radius:6px;margin-top:4px}

/* ---- Tags ---- */
.tags{display:flex;flex-wrap:wrap;gap:6px} .tagx{background:var(--canvas);border-radius:20px;padding:4px 6px 4px 12px;font-size:12.5px;display:inline-flex;align-items:center;gap:4px}
.tagx button{border:0;background:transparent;cursor:pointer;color:var(--ink2);font-size:12px} .codeblk{background:#1d1d1f;color:#e0e0e0;border-radius:9px;padding:10px;font-size:11.5px;overflow-x:auto;white-space:pre}

/* ---- Empty ---- */
.empty{text-align:center;color:var(--ink2);padding:34px;font-size:13.5px}

/* ---- Modal ---- */
.modal-back{position:fixed;inset:0;background:rgba(0,0,0,.32);display:flex;align-items:flex-start;justify-content:center;padding:40px 16px;z-index:100;overflow-y:auto;backdrop-filter:blur(2px)}
.modal{background:#fff;border-radius:var(--r-modal);width:100%;box-shadow:var(--sh-2);animation:pop .18s ease}
@keyframes pop{from{transform:scale(.96) translateY(6px);opacity:0}to{transform:none;opacity:1}}
.modal-head{display:flex;align-items:center;justify-content:space-between;padding:18px 22px 8px} .modal-head h3{margin:0;font-size:17px;font-weight:700}
.x{border:0;background:transparent;font-size:16px;cursor:pointer;color:var(--ink2)} .modal-body{padding:8px 22px 16px} .modal-foot{display:flex;gap:8px;justify-content:flex-end;padding:14px 22px;border-top:1px solid var(--hair);flex-wrap:wrap}

/* ---- Toast ---- */
.toast{position:fixed;bottom:24px;left:50%;transform:translateX(-50%) translateY(20px);background:#1d1d1f;color:#fff;padding:11px 20px;border-radius:12px;font-size:13.5px;font-weight:500;box-shadow:var(--sh-2);opacity:0;transition:.3s;z-index:200}
.toast.show{opacity:1;transform:translateX(-50%)} .toast.err{background:var(--brand-dark)}

/* ---- Portal (customer-facing, mobile) ---- */
.portal,.portal-frame .portal{max-width:420px;margin:0 auto;padding:18px 16px 40px}
.portal-frame{background:var(--canvas);border-radius:16px;max-height:72vh;overflow-y:auto}
.p-head{background:var(--side,#181818);border-radius:16px;padding:18px 22px;margin-bottom:16px;display:flex;justify-content:center}
.p-head .p-lockup{width:100%;max-width:220px;height:auto;display:block}
.p-veh{background:linear-gradient(135deg,var(--brand),var(--brand-dark));color:#fff;border-radius:16px;padding:18px;margin-bottom:14px;box-shadow:var(--sh-1)}
.p-plate{font-size:24px;font-weight:800;letter-spacing:.04em} .p-model{font-size:14px;opacity:.95;margin-top:2px} .p-owner{font-size:12.5px;opacity:.85;margin-top:6px}
.p-card{background:#fff;border:1px solid var(--hair);border-radius:14px;padding:15px;margin-bottom:12px;box-shadow:var(--sh-1)}
.p-card.p-due{border-color:#f3b5b5;background:#fff7f7} .p-card-t{font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:.05em;color:var(--ink2);margin-bottom:8px}
.p-big{font-size:18px;font-weight:700} .p-card-s{font-size:12.5px;color:var(--ink2);margin-top:2px}
.p-item{display:flex;align-items:baseline;gap:10px;padding:7px 0;border-bottom:1px solid var(--hair)} .p-item:last-child{border-bottom:0}
.p-date{font-size:11.5px;color:var(--ink2);flex:0 0 78px} .p-work{flex:1;font-size:13px} .p-odo{font-size:11.5px;color:var(--ink2)}
.p-empty{color:var(--ink2);font-size:13px;text-align:center;padding:10px}
.p-photos{display:grid;grid-template-columns:repeat(3,1fr);gap:6px} .p-photos img{width:100%;aspect-ratio:1;object-fit:cover;border-radius:9px}
.p-contact{font-size:13px;line-height:1.6} .p-btn{display:block;text-align:center;background:var(--brand);color:#fff;border-radius:11px;padding:11px;font-weight:600;margin-top:10px}
.p-foot{text-align:center;font-size:11px;color:var(--ink2);margin-top:10px}

/* ---- Responsive ---- */
@media (max-width:900px){
  .cols{grid-template-columns:1fr} .sidebar{position:fixed;left:0;top:0;z-index:60;transform:translateX(-100%);transition:transform .25s}
  .sidebar.open{transform:none;box-shadow:var(--sh-2)} .hamburger{display:block}
  .kanban{grid-template-columns:1fr} .grid2,.grid2cards,.ksmall{grid-template-columns:1fr} .content{padding:16px}
  /* Top bar: keep one tidy, vertically-centred row on phones */
  .topbar{padding:10px 14px;gap:10px}
  .tb-title{flex:1 1 auto;min-width:0;font-size:14px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
  .tb-right{gap:9px;flex-shrink:0}
  .tb-stat,.savestate{display:none}          /* drop non-essential labels on mobile */
  .userchip{max-width:120px;font-size:11px}
}
@media (max-width:420px){
  .userchip{max-width:92px}                   /* very narrow phones: trim email further */
}
@media (prefers-reduced-motion:reduce){*{animation:none!important;transition:none!important}}

/* ---- Login screen (cloud auth gate) ---- */
.login-bg{position:fixed;inset:0;display:flex;align-items:center;justify-content:center;padding:20px;
  background:radial-gradient(120% 120% at 50% 0%, #232326 0%, #131314 55%, #0b0b0c 100%)}
.login-card{width:100%;max-width:380px;background:#1b1b1d;border:1px solid rgba(255,255,255,.08);
  border-radius:22px;padding:30px 26px 24px;box-shadow:0 30px 80px rgba(0,0,0,.55);text-align:center}
.login-logo{width:100%;max-width:210px;height:auto;display:block;margin:0 auto 6px}
.login-sub{color:#9a9a9f;font-size:12px;letter-spacing:.03em;margin-bottom:18px}
.lg-field{display:block;text-align:left;margin-bottom:13px}
.lg-field span{display:block;font-size:11.5px;font-weight:600;color:#9a9a9f;margin-bottom:5px}
.lg-field input{width:100%;background:#0e0e10;border:1px solid rgba(255,255,255,.12);color:#f5f5f7;
  border-radius:11px;padding:11px 13px;font:inherit;font-size:14px}
.lg-field input:focus{outline:none;border-color:var(--brand);box-shadow:0 0 0 3px rgba(242,23,23,.25)}
.lg-btn{margin-top:6px;font-size:15px;padding:11px}
.lg-link{background:none;border:0;color:#9a9a9f;font:inherit;font-size:12.5px;cursor:pointer;margin-top:12px;text-decoration:underline}
.lg-link:hover{color:#f5f5f7}
.lg-msg{border-radius:10px;padding:9px 12px;font-size:12.5px;margin-bottom:14px;text-align:left}
.lg-msg.err{background:rgba(242,23,23,.16);color:#ff9a9a;border:1px solid rgba(242,23,23,.35)}
.lg-msg.ok{background:rgba(52,199,89,.16);color:#7fe6a0;border:1px solid rgba(52,199,89,.3)}
.cloud-spin{width:26px;height:26px;margin:18px auto 4px;border:3px solid rgba(255,255,255,.15);border-top-color:var(--brand);border-radius:50%;animation:spin .8s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}
.lg-status{margin-top:16px;font-size:11px;color:#7a7a80}
.lg-status.ok b{color:#9a9a9f}
.userchip{font-size:12px;color:var(--ink2);background:var(--canvas);padding:3px 10px;border-radius:20px;max-width:170px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
[data-theme="dark"] .userchip{background:#1f1f22}
.searchbox{max-width:280px;min-width:150px;flex:1 1 180px}
.row.wrap{flex-wrap:wrap}
.rolebadge{font-size:10.5px;font-weight:700;letter-spacing:.03em;color:#fff;background:#6E6E73;padding:3px 9px;border-radius:20px;white-space:nowrap}
.rolebadge.admin{background:var(--brand)}
.tbl.perm th,.tbl.perm td{text-align:center}.tbl.perm td:first-child,.tbl.perm th:first-child{text-align:left}
.tbl.perm input[type=checkbox]{width:17px;height:17px;cursor:pointer;accent-color:var(--brand)}

/* ============================================================================
   DARK MODE — toggled via [data-theme="dark"] on <html>. Print docs stay light.
   Sidebar is already dark (--side vars), so it carries over unchanged.
   ========================================================================== */
[data-theme="dark"]{
  --canvas:#0b0b0c; --panel:#161618; --hair:rgba(255,255,255,.10);
  --ink:#f5f5f7; --ink2:#98989d; --brand-tint:rgba(242,23,23,.16);
}
[data-theme="dark"] .topbar{background:rgba(18,18,20,.72);border-bottom-color:var(--hair)}
[data-theme="dark"] .tb-stat{background:#1f1f22}
[data-theme="dark"] .btn{background:#1f1f22;border-color:var(--hair);color:var(--ink)}
[data-theme="dark"] .btn.ghost{background:#1f1f22}
[data-theme="dark"] .btn.primary{background:var(--brand);border-color:var(--brand);color:#fff}
[data-theme="dark"] .btn.danger{background:#1f1f22;border-color:#5a2a2d;color:#ff8a8a}
[data-theme="dark"] .btn.danger:hover{background:#2a1416}
[data-theme="dark"] input,[data-theme="dark"] select,[data-theme="dark"] textarea{background:#1f1f22;border-color:var(--hair);color:var(--ink)}
[data-theme="dark"] .tbl th{background:#1c1c1e}
[data-theme="dark"] .tbl.click tbody tr:hover{background:rgba(242,23,23,.13)}
[data-theme="dark"] .seg,[data-theme="dark"] .bar-track,[data-theme="dark"] .kcol,
[data-theme="dark"] .baycell.nobay,[data-theme="dark"] .lock,[data-theme="dark"] .mechbox,
[data-theme="dark"] .cal-cell.empty{background:#0e0e10}
[data-theme="dark"] .seg-b.on{background:#2a2a2e;color:#fff}
[data-theme="dark"] .kcount{background:#1f1f22}
[data-theme="dark"] .jcard,[data-theme="dark"] .baycell{background:#1f1f22;border-color:var(--hair)}
[data-theme="dark"] .jcard:hover{border-color:var(--brand)}
[data-theme="dark"] .modal{background:#1c1c1e}
[data-theme="dark"] .modal-back{background:rgba(0,0,0,.58)}
[data-theme="dark"] .cal-cell.today{background:#241a06}
[data-theme="dark"] .step .dot{background:#1f1f22;border-color:var(--hair)}
[data-theme="dark"] .codeblk{background:#000}
[data-theme="dark"] .alert{background:#1f1f22;border-color:var(--hair)}
[data-theme="dark"] .alert.a-low{background:#1c1c1e}
[data-theme="dark"] .alert.a-due{background:rgba(242,23,23,.16);border-color:rgba(242,23,23,.4);color:#ff8a8a}
[data-theme="dark"] .alert.a-soon{background:rgba(255,192,0,.13);border-color:rgba(255,192,0,.32);color:#ffd60a}
[data-theme="dark"] .chip{background:#2a2a2e;color:#c7c7cd}
[data-theme="dark"] .chip.ok,[data-theme="dark"] .sbadge.gC{background:rgba(52,199,89,.18);color:#5fe08a}
[data-theme="dark"] .chip.gold,[data-theme="dark"] .sbadge.gB{background:rgba(255,192,0,.18);color:#ffd60a}
[data-theme="dark"] .chip.due,[data-theme="dark"] .lowpill{background:rgba(242,23,23,.2);color:#ff8a8a}
[data-theme="dark"] .sbadge.gA{background:rgba(110,128,255,.2);color:#aeb6ff}
[data-theme="dark"] .released{background:rgba(52,199,89,.14);color:#5fe08a}
[data-theme="dark"] .due-banner{background:#2a2206}
[data-theme="dark"] .nextsvc.due{color:#ff8a8a}
[data-theme="dark"] .bay-car:hover{background:rgba(242,23,23,.28)}
[data-theme="dark"] .p-due{border-color:rgba(242,23,23,.4)!important;background:rgba(242,23,23,.08)!important}
</style>

'use strict';

/* ---- Brand / logo --------------------------------------------------------- */
var BRAND = { red:'#F21717', redDark:'#CC0F0F', gold:'#FFC000' };

/* Official "Basic" symbol composited on a black rounded box is supplied by the
   build as a pre-defined LOGO_URI (src/logo.js, prepended before this file).
   If it isn't present, fall back to a clean red rounded-square "B" monogram. */
var LOGO_SVG =
  "<svg xmlns='http://www.w3.org/2000/svg' width='128' height='128' viewBox='0 0 128 128'>" +
  "<rect width='128' height='128' rx='28' fill='#111111'/>" +
  "<text x='64' y='64' dy='.34em' text-anchor='middle' font-family=\"-apple-system,Segoe UI,Roboto,sans-serif\" " +
  "font-size='80' font-weight='800' fill='#F21717'>B</text></svg>";

/* btoa exists in modern browsers and Node 16+; guard anyway. */
function _b64(s){
  try { return (typeof btoa==='function') ? btoa(s) : Buffer.from(s,'binary').toString('base64'); }
  catch(e){ return Buffer.from(s,'binary').toString('base64'); }
}
var LOGO_URI;     /* mark: red symbol on black box — set by prepended logo.js */
var LOGO_LOCKUP;  /* full primary lockup (dark bg) — set by prepended logo.js */
var LOGO_BG;      /* the lockup's background color, for seamless dark surfaces */
if (typeof LOGO_URI === 'undefined' || !LOGO_URI){
  LOGO_URI = 'data:image/svg+xml;base64,' + _b64(LOGO_SVG);
}
if (typeof LOGO_LOCKUP === 'undefined' || !LOGO_LOCKUP){ LOGO_LOCKUP = LOGO_URI; }
if (typeof LOGO_BG === 'undefined' || !LOGO_BG){ LOGO_BG = '#181818'; }

/* ---- Status codes --------------------------------------------------------- */
var STATUS = {
  A1:'Unit received, waiting for diagnosis',
  A2:'Unit diagnosed, waiting for parts quotation',
  A3:'Unit diagnosed, waiting for mechanic',
  B1:'On-going job, waiting for parts',
  B2:'On-going job, parts complete',
  B3:'Job stopped, waiting for parts',
  C1:'Job done, waiting for test drive & clearance',
  C2:'Release not cleared, return to mechanic',
  C3:'Release cleared, forward to billing'
};
var STATUS_ORDER = ['A1','A2','A3','B1','B2','B3','C1','C2','C3'];
function statusGroup(code){ return code ? code.charAt(0) : 'A'; }
var STATUS_GROUP_NAME = { A:'Diagnosis', B:'In Progress', C:'Release' };

/* ---- Utilities ------------------------------------------------------------ */
var PHP = new Intl.NumberFormat('en-PH', { style:'currency', currency:'PHP' });
function peso(n){ return PHP.format(Number(n)||0); }
function num(n){ return (Number(n)||0).toLocaleString('en-PH'); }
function round2(n){ return Math.round((Number(n)||0)*100)/100; }
/* Odometer reading: thousands comma + " km". */
function odo(n){ return num(Number(n)||0)+' km'; }
/* Fuel level as a percentage. Numeric -> "n%"; legacy free-text shown as-is; blank -> "—". */
function fmtFuel(f){ if(f===''||f===null||f===undefined) return '—'; return isFinite(f)? (Number(f)+'%') : String(f); }

function esc(s){
  if (s===null || s===undefined) return '';
  return String(s)
    .replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;')
    .replace(/"/g,'&quot;').replace(/'/g,'&#39;');
}
function attr(s){ return esc(s); }

var _idc = 0;
function uid(p){ _idc++; return (p||'id') + '_' + Date.now().toString(36) + '_' + _idc.toString(36); }

function todayISO(d){ d = d || new Date();
  return d.getFullYear() + '-' + String(d.getMonth()+1).padStart(2,'0') + '-' + String(d.getDate()).padStart(2,'0'); }
function fmtDate(iso){ if(!iso) return '—';
  var d = new Date(iso + (iso.length<=10 ? 'T00:00:00' : ''));
  if (isNaN(d)) return iso;
  return d.toLocaleDateString('en-PH', { year:'numeric', month:'short', day:'numeric' });
}
function fmtDateTime(iso){ if(!iso) return '—'; var d=new Date(iso); if(isNaN(d)) return iso;
  return d.toLocaleString('en-PH',{month:'short',day:'numeric',hour:'2-digit',minute:'2-digit'}); }
function daysBetween(a,b){ var ms = new Date(b) - new Date(a); return Math.floor(ms/86400000); }

/* ---- Line / money math (single source of truth) --------------------------- */
function lineTotal(l){ return round2((Number(l.qty)||0) * (Number(l.price)||0)); }
function sumLines(lines, type){
  return round2((lines||[]).reduce(function(s,l){
    if (type && l.type!==type) return s; return s + lineTotal(l);
  },0));
}
function partsTotal(lines){ return sumLines(lines,'part'); }
function laborTotal(lines){ return sumLines(lines,'labor'); }
function addlTotal(job){
  return round2(((job&&job.addlWork)||[]).reduce(function(s,a){
    return s + (a.approved ? (Number(a.amount)||0) : 0);
  },0));
}
function grossBeforeDiscount(job){
  return round2(sumLines(job.lines) + addlTotal(job));
}
/* VATable base = SRP/line total (prices are VAT-EXCLUSIVE; NO discount here —
   the discount is applied to the Total Amount Due, after VAT). */
function jobNet(job){ return grossBeforeDiscount(job); }
/* Subtotal = VATable + 12% VAT, before discount. */
function jobSubtotal(job){
  var n = jobNet(job);
  if (!S || !S.shop || !S.shop.vatReg) return n;
  var rate = (Number(S.shop.vatRate)||12)/100;
  return round2(n * (1 + rate));
}
/* Discount is taken off the (VAT-inclusive) Total Amount Due. */
function discountAmount(job){
  var d = job.discount || { type:'amount', value:0 };
  var base = jobSubtotal(job);
  if (d.type==='percent') return round2(base * (Number(d.value)||0)/100);
  return round2(Math.min(Number(d.value)||0, base));
}
/* Total Amount Due = subtotal (VATable + VAT) − discount. */
function jobGross(job){ return round2(jobSubtotal(job) - discountAmount(job)); }

/* VAT-EXCLUSIVE split: input is the VATable base; VAT (12%) is added on top.
   vatable = base, vat = base × rate, gross (total due) = base + vat. */
function vatSplit(base, S){
  base = round2(base);
  if (!S || !S.shop || !S.shop.vatReg) return { vatable: base, vat:0, gross:base, exempt:true };
  var rate = (Number(S.shop.vatRate)||12)/100;
  var vat = round2(base * rate);
  var gross = round2(base + vat);
  return { vatable:base, vat:vat, gross:gross, exempt:false };
}

/* Commission is admin-controlled per staff: each person has their OWN rate
   (% of labor), set by an admin on the Staff page — not a single fixed rate.
   On a job, every assigned person earns their own rate × the job's labor
   (no shared pool). If a person has no rate set, the shop default applies. */
function staffCommissionRate(idOrStaff){
  var s = (idOrStaff && typeof idOrStaff==='object') ? idOrStaff : staffById(idOrStaff);
  if(!s) return 0;
  var r = s.commissionRate;
  if(r===undefined || r===null || r==='') return Number(S.shop.mechCommissionRate)||0;  // fallback default
  return Number(r)||0;
}
/* The distinct staff assigned to a job. includeAll=true returns EVERYONE assigned
   (ignoring the payout toggle) — used for the evaluation/KPI figure. Default
   returns only commission-eligible (toggle-on) staff — used for actual payout. */
function assignedCommissionIds(job, includeAll){
  var ids = [];
  (job.mechanicIds||[]).forEach(function(x){ if(x && x!=='TBA') ids.push(x); });
  [job.saId, job.assessedBy, job.partsSalesman].forEach(function(x){ if(x && x!=='TBA') ids.push(x); });
  var uniq = [];
  ids.forEach(function(id){ if(uniq.indexOf(id)<0 && (includeAll || commissionEligible(id))) uniq.push(id); });
  return uniq;
}
/* Actual payout map — each assigned, toggle-on person earns their own rate × labor. */
function jobLaborCommissionMap(job, S){
  var labor = laborTotal(job.lines); var map = {};
  assignedCommissionIds(job).forEach(function(id){ map[id] = round2(labor * staffCommissionRate(id)/100); });
  return map;
}
/* Evaluation map — same per-person rates but ignoring the payout toggle, so an
   excluded person still shows the commission they WOULD earn. */
function jobLaborCommissionMapAll(job, S){
  var labor = laborTotal(job.lines); var map = {};
  assignedCommissionIds(job, true).forEach(function(id){ map[id] = round2(labor * staffCommissionRate(id)/100); });
  return map;
}
/* Total labor-commission cost of a job (toggle-on staff) and the assignee count. */
function jobLaborCommission(job, S){
  var m = jobLaborCommissionMap(job, S); var ids = Object.keys(m);
  var pool = round2(ids.reduce(function(t,id){ return t + m[id]; }, 0));
  return { pool:pool, count:ids.length, map:m };
}
/* Every staff member is entitled to commission by default; an admin can switch
   an individual off via the Staff Productivity toggle (sets staff.commission=false). */
function commissionEligible(idOrStaff){
  var s = (idOrStaff && typeof idOrStaff==='object') ? idOrStaff : staffById(idOrStaff);
  return !!s && s.commission !== false;
}

/* ---- Payment helpers ------------------------------------------------------ */
function jobPaid(job){ return round2(((job.payments)||[]).reduce(function(s,p){return s+(Number(p.amount)||0);},0)); }
function jobBalance(job){ return round2(jobGross(job) - jobPaid(job)); }

/* ---- Storage adapter ------------------------------------------------------
   Tries window.storage (async get/set) -> localStorage -> in-memory.        */
var STORE_KEY = 'bas_ops_v2';
var _mem = {};
var Storage = {
  async get(k){
    try {
      if (typeof window!=='undefined' && window.storage && window.storage.get){
        return await window.storage.get(k);
      }
    } catch(e){}
    try { if (typeof localStorage!=='undefined'){ var v=localStorage.getItem(k); return v==null?null:v; } } catch(e){}
    return (k in _mem) ? _mem[k] : null;
  },
  async set(k,v){
    try {
      if (typeof window!=='undefined' && window.storage && window.storage.set){
        await window.storage.set(k,v); return true;
      }
    } catch(e){}
    try { if (typeof localStorage!=='undefined'){ localStorage.setItem(k,v); return true; } } catch(e){}
    _mem[k]=v; return true;
  }
};

var SAVE_TIMER = null;

function persist(){
  // debounced save with indicator. In cloud mode, sync changed records to
  // Firestore; otherwise fall back to the local storage adapter.
  setSaveState('saving');
  if (SAVE_TIMER) clearTimeout(SAVE_TIMER);
  SAVE_TIMER = setTimeout(function(){
    if (typeof cloudOn==='function' && cloudOn() && typeof FB!=='undefined' && FB && FB.ready && FB.user){
      cloudPersist().then(function(){ setSaveState('saved'); })
        .catch(function(e){ console.error('cloud save failed', e); setSaveState('saved'); });
    } else {
      Storage.set(STORE_KEY, JSON.stringify(S)).then(function(){ setSaveState('saved'); });
    }
  }, 400);
}

  if (typeof document==='undefined') return;

async function loadState(){

  if (!S || S.version!==2){ S = seedState(); persist(); }
  // migration safety: ensure arrays exist
  ['staff','bays','parts','labor','vehicles','estimates','jobs','appointments','purchaseOrders'].forEach(function(k){
    if (!Array.isArray(S[k])) S[k]=[];
  });
  if (!S.counters) S.counters = { est:0, jo:0, or:1000, po:0 };
  if (S.shop && !S.shop.theme) S.shop.theme = 'light';
  return S;
}

/* ---- Master render --------------------------------------------------------
   Mount the shell (sidebar + top bar) ONCE; thereafter only the content region
   is repainted. Avoids rebuilding/re-laying-out the sidebar on every action and
   preserves scroll/focus — the main "make it fast" win. A full remount happens
   only on first paint or when switching between the shop UI and the portal. */
/* Global keyboard:
   - ESC = "back": close an open modal, else step a detail page back to its list.
   - ENTER in a field = move to the next field; on the last field of a dialog,
     trigger its Save/primary button (textareas keep normal multi-line Enter). */
var _keysBound=false;
function _formFields(container){
  return Array.prototype.slice.call(container.querySelectorAll(
    'input:not([type=hidden]):not([disabled]):not([readonly]), select:not([disabled])'
  )).filter(function(el){ return el.type!=='button' && el.type!=='submit' && el.offsetParent!==null; });
}
function bindKeys(){
  if (_keysBound || typeof document==='undefined' || !document.addEventListener) return;
  _keysBound=true;
  document.addEventListener('keydown', function(e){
    // ESC = close any open modal, otherwise jump to the Operations Board
    if (e.key==='Escape' || e.keyCode===27){
      if (document.querySelector && document.querySelector('#modalRoot .modal-back')){ e.preventDefault(); closeModal(); return; }
      if (ROUTE.view!=='board'){ e.preventDefault(); go('board'); }
      return;
    }
    // ENTER = advance to next field (or submit on the last one)
    if (e.key==='Enter' || e.keyCode===13){
      var t=e.target; if(!t||!t.tagName) return;
      var tag=t.tagName.toUpperCase();
      if (tag==='TEXTAREA') return;                       // allow newlines in notes
      if (tag!=='INPUT' && tag!=='SELECT') return;        // only form fields
      if (t.type==='button' || t.type==='submit') return;
      var modal=t.closest && t.closest('.modal');
      var login=t.closest && t.closest('.login-card');
      var container = modal || login || (t.closest && (t.closest('.card')||t.closest('.page'))) || document.getElementById('app');
      if(!container) return;
      var fields=_formFields(container);
      var idx=fields.indexOf(t);
      if(idx<0) return;
      if(idx < fields.length-1){
        e.preventDefault();
        var nx=fields[idx+1]; if(nx.focus) nx.focus();
        if(nx.select && /^(text|number|email|password|search|tel|url)$/.test(nx.type||'text')){ try{nx.select();}catch(_){} }
      } else if (modal || login){
        e.preventDefault();
        var btn=(modal && (modal.querySelector('.modal-foot .btn.primary')||modal.querySelector('.btn.primary'))) ||
                (login && login.querySelector('.btn.primary'));
        if(btn) btn.click();
      }
    }
  });
}

var _mounted=false, _mode=null;
function render(){
  if (typeof document==='undefined') return;
  bindKeys();
  var mode = isPortalRoute() ? 'portal' : 'app';
  if (!_mounted || mode!==_mode){
    if (mode==='portal'){ document.getElementById('app').innerHTML = portalHTML(); _mode='portal'; _mounted=true; return; }
    document.getElementById('app').innerHTML =
      sidebarHTML() +
      '<div class="main">' + topbarHTML() +
        '<div class="content" id="content">' + renderView() + '</div>' +
      '</div>' +
      '<div id="modalRoot"></div>';
    _mode='app'; _mounted=true;
    if (typeof afterRender==='function') afterRender();
    return;
  }
  // fast path: shell already in the DOM — swap only the content + light nav/topbar bits
  var c = document.getElementById('content');

function updateNavActive(){
  var btns = document.querySelectorAll ? document.querySelectorAll('.nav') : null;

/* ---- Photo upload (resize ~1100px, JPEG ~0.7) ----------------------------- */
function handlePhotoFiles(files, cb){
  var arr = Array.prototype.slice.call(files||[]); var out=[]; var pending=arr.length;
  if (!pending){ cb([]); return; }
  arr.forEach(function(f){
    var r = new FileReader();
    r.onload = function(){
      var img = new Image();
      img.onload = function(){
        var max=1100, w=img.width, h=img.height;
        if (w>max||h>max){ if(w>h){ h=Math.round(h*max/w); w=max; } else { w=Math.round(w*max/h); h=max; } }
        var cv=document.createElement('canvas'); cv.width=w; cv.height=h;
        cv.getContext('2d').drawImage(img,0,0,w,h);
        out.push(cv.toDataURL('image/jpeg',0.7));
        if(--pending===0) cb(out);
      };
      img.onerror=function(){ if(--pending===0) cb(out); };
      img.src=r.result;
    };
    r.onerror=function(){ if(--pending===0) cb(out); };
    r.readAsDataURL(f);
  });
}

function printDoc(html){
  if (typeof window==='undefined') return;
  var w = null;
  try { w = window.open('', '_blank'); } catch(e){ w=null; }
  if (w && w.document){
    w.document.open(); w.document.write(html); w.document.close();
    setTimeout(function(){ try{ w.focus(); w.print(); }catch(e){} }, 300);
  } else {
    // fallback: modal iframe (sandboxed artifact)
    openModal('Print preview',
      '<iframe style="width:100%;height:70vh;border:1px solid #E5E5EA;border-radius:10px" srcdoc="'+attr(html)+'"></iframe>',
      { footer:'<button class="btn ghost" onclick="closeModal()">Close</button>'+
               '<button class="btn primary" onclick="printIframe()">Print</button>', width:'860px' });
  }
}

/* ---- Update-due detection ------------------------------------------------- */
function lastCheckpointDue(){
  var cps = (S.shop.checkpoints||[]).slice().sort();
  var now = new Date(); var hm = String(now.getHours()).padStart(2,'0')+':'+String(now.getMinutes()).padStart(2,'0');
  var due=null;
  cps.forEach(function(cp){ if (cp<=hm) due=cp; });
  return due; // most recent checkpoint passed today, or null
}
function isUpdateDue(job){
  if (job.stage!=='Job Order' || statusGroup(job.status)==='C') return false;
  var cp = lastCheckpointDue(); if(!cp) return false;
  var log = job.statusLog||[]; if(!log.length) return true;
  var lastTime = new Date(log[log.length-1].time);
  var today = new Date(); var cpDate = new Date(today.getFullYear(),today.getMonth(),today.getDate(),
    parseInt(cp.slice(0,2),10), parseInt(cp.slice(3),10));
  return lastTime < cpDate;
}

function alertStrip(){
  var alerts=[];
  // PMS reminders
  var today = todayISO();
  S.vehicles.forEach(function(v){
    if (v.nextServiceDate && v.nextServiceDate <= todayISO(new Date(Date.now()+14*86400000))){
      var due = v.nextServiceDate < today;
      alerts.push({ kind:due?'due':'soon', text:(due?'PMS overdue':'PMS due soon')+': '+v.plate+' ('+v.make+' '+v.model+') · '+fmtDate(v.nextServiceDate),
        act:"go('vehicle','"+v.id+"')" });
    }
  });
  // low stock
  S.parts.forEach(function(p){
    if ((p.stock||0) <= (p.reorder||0)) alerts.push({ kind:'low', text:'Low stock: '+p.name+' ('+p.stock+' left)', act:"go('parts')" });
  });
  if (!alerts.length) return '';
  return '<div class="alertstrip">'+alerts.slice(0,6).map(function(a){
    return '<button class="alert a-'+a.kind+'" onclick="'+a.act+'">'+esc(a.text)+'</button>';
  }).join('')+ (alerts.length>6?'<span class="alert-more">+'+(alerts.length-6)+' more</span>':'') +'</div>';
}

var CAL = { y:null, m:null }; // current calendar month

function calShift(delta){ calInit(); CAL.m+=delta; if(CAL.m<0){CAL.m=11;CAL.y--;} if(CAL.m>11){CAL.m=0;CAL.y++;} render(); }
function calToday(){ var d=new Date(); CAL.y=d.getFullYear(); CAL.m=d.getMonth(); render(); }

VIEWS.appointments = function(){
  calInit();
  var first = new Date(CAL.y, CAL.m, 1);

  var days = new Date(CAL.y, CAL.m+1, 0).getDate();
  var monthName = first.toLocaleDateString('en-PH',{month:'long',year:'numeric'});

  for (var d=1; d<=days; d++){

    var ap = S.appointments.filter(function(a){return a.date===iso && a.status!=='Cancelled';});

    var chips = ap.slice(0,3).map(function(a){

    cells+='<div class="cal-cell'+(isToday?' today':'')+'" onclick="newAppt(\''+iso+'\')">'+

  }

      '<div class="row gap"><button class="btn ghost" onclick="calShift(-1)">‹</button>'+
      '<button class="btn ghost" onclick="calToday()">Today</button>'+

function createJob(base){
  var j = Object.assign(blankJob(), base||{});
  if (!j.statusLog.length) j.statusLog=[{ time:new Date().toISOString(), code:j.status||'A1', by:j.saId||'', note:'Job Order created.' }];
  var v = ensureVehicle(j);
  j.vehicleId = v.id;
  ['owner','address','contactPerson','contactNumber','chassis','year','make','model','variant'].forEach(function(k){
    if(!j[k]) j[k]=v[k];
  });
  S.jobs.unshift(j); persist();
  return j;
}
function createJobFromAppt(a){
  var v = vehicleByPlate(a.plate);
  return createJob({
    plate:a.plate||(v&&v.plate)||'', owner:(v&&v.owner)||a.customer, contactPerson:(v&&v.contactPerson)||a.customer,
    contactNumber:a.contactNumber, address:(v&&v.address)||'', chassis:(v&&v.chassis)||'',
    year:(v&&v.year)||'', make:(v&&v.make)||'', model:(v&&v.model)||'',
    saId:a.assignedTo!=='TBA'?a.assignedTo:'', bayId:a.bayId||'TBA', notes:a.service?('Booked service: '+a.service):'',
    odometer:(v&&v.odometer)||0
  });
}

/* ---- Ingress (front-desk intake) ------------------------------------------ */
/* Fields that must be filled for a complete ingress. The Job Order can be created
   with gaps (finish later), but a Post Job Report can NOT be created until these
   are all complete. */
/* Variant is OPTIONAL — not every vehicle has a named variant. */
var INGRESS_REQUIRED = [
  ['plate','Plate'],['owner','Registered owner'],['contactPerson','Contact person'],
  ['contactNumber','Contact #'],['address','Address'],['chassis','Chassis #'],
  ['year','Year'],['make','Make'],['model','Model'],
  ['odometer','Ingress odometer'] ];
function jobMissingFields(j){
  return INGRESS_REQUIRED.filter(function(f){
    var v=j[f[0]];
    if(f[0]==='odometer') return !(Number(v)>0);
    return !String(v==null?'':v).trim();
  }).map(function(f){ return f[1]; });
}
function openIntake(draft){
  openModal('Ingress — front desk', intakeForm(draft||{}), {
    footer:'<button class="btn ghost" onclick="closeModal()">Cancel</button>'+
      '<button class="btn ghost" onclick="intakeSubmit(\'estimate\')">Create Estimate</button>'+
      '<button class="btn primary" onclick="intakeSubmit(\'job\')">Create Job Order</button>', width:'680px' });
}
function intakeForm(d){
  return '<div class="grid2">'+
    field('Plate','<input id="inPlate" value="'+attr(d.plate||'')+'" oninput="intakeLookup()" placeholder="ABC 1234">')+
    field('Registered owner','<input id="inOwner" value="'+attr(d.owner||'')+'">')+
    field('Contact person','<input id="inCP" value="'+attr(d.contactPerson||'')+'">')+
    field('Contact #','<input id="inContact" value="'+attr(d.contactNumber||'')+'">')+
    field('Address','<input id="inAddr" value="'+attr(d.address||'')+'">')+
    field('Chassis #','<input id="inChassis" value="'+attr(d.chassis||'')+'">')+
    field('Year','<input id="inYear" type="number" value="'+attr(d.year||'')+'">')+
    field('Make','<input id="inMake" value="'+attr(d.make||'')+'">')+
    field('Model','<input id="inModel" value="'+attr(d.model||'')+'">')+
    field('Variant','<input id="inVariant" value="'+attr(d.variant||'')+'">')+
    field('Ingress odometer','<input id="inOdo" type="number" value="'+attr(d.odometer||'')+'">')+
    '</div>'+
    field('Concerns / reported issues','<textarea id="inNotes" rows="3">'+esc(d.notes||'')+'</textarea>');
}
function intakeLookup(){ var v=vehicleByPlate(val('inPlate')); if(v){ setVal('inCP',v.contactPerson); setVal('inContact',v.contactNumber);
  setVal('inOwner',v.owner); setVal('inAddr',v.address); setVal('inChassis',v.chassis); setVal('inYear',v.year); setVal('inMake',v.make); setVal('inModel',v.model); setVal('inVariant',v.variant); setVal('inOdo',v.odometer);
  toast('Existing vehicle found — prefilled'); } }
function intakeSubmit(kind){
  var base={ plate:val('inPlate'), contactPerson:val('inCP'), contactNumber:val('inContact'), owner:val('inOwner'),
    address:val('inAddr'), chassis:val('inChassis'), year:val('inYear'), make:val('inMake'), model:val('inModel'), variant:val('inVariant'),
    odometer:Number(val('inOdo'))||0, notes:val('inNotes') };
  if (!base.plate){ toast('Plate is required','err'); return; }
  if (kind==='estimate'){ closeModal(); var e=createEstimateFrom(base); go('estimate', e.id); return; }
  // Job Order: if ingress is incomplete, prompt to finish now or proceed and complete later.
  var missing = jobMissingFields(base);
  if (missing.length){ _ingressDraft=base; promptIncompleteIngress(missing); return; }
  closeModal(); var j=createJob(base); toast('Job Order '+j.no+' created'); go('job', j.id);
}
var _ingressDraft=null;
function promptIncompleteIngress(missing){
  openModal('Complete ingress details?',
    '<p class="muted small">These fields are still blank:</p>'+
    '<p><b>'+missing.map(esc).join(', ')+'</b></p>'+
    '<p class="muted small">You can create the Job Order now and finish them later in Job Details — '+
    'but the <b>Post Job Report cannot be created</b> until every field is complete.</p>',
    { footer:'<button class="btn ghost" onclick="reopenIngress()">‹ Go back &amp; complete</button>'+
      '<span style="flex:1"></span>'+
      '<button class="btn primary" onclick="createJobAnyway()">Create, finish later</button>', width:'520px' });
}
function reopenIngress(){ openIntake(_ingressDraft||{}); }
function createJobAnyway(){ var b=_ingressDraft||{}; _ingressDraft=null; closeModal(); var j=createJob(b); toast('Job Order '+j.no+' created — complete the remaining details later'); go('job', j.id); }

/* ---- Job Orders list ------------------------------------------------------ */
var JOB_Q='';
function jobMatch(j){
  if(!JOB_Q) return true; var q=JOB_Q.toLowerCase();
  return [j.no,j.plate,j.owner,j.contactPerson,j.make+' '+j.model,j.siRef,j.pmsRef].some(function(x){ return String(x||'').toLowerCase().indexOf(q)>=0; });
}
function jobsBodyHTML(){
  var jobs=S.jobs.filter(jobMatch);
  if(!jobs.length) return emptyState(JOB_Q? 'No job orders match “'+esc(JOB_Q)+'”.' : 'No job orders yet. Click New Ingress.');
  var rows = jobs.map(function(j){
    return '<tr onclick="go(\'job\',\''+j.id+'\')">'+
      '<td><b>'+esc(j.no)+'</b></td><td>'+esc(j.plate)+'</td>'+
      '<td>'+esc(j.make+' '+j.model)+'</td>'+
      '<td>'+chip(j.stage, j.stage==='Released'?'ok':j.stage==='Job Order'?'':'gold')+'</td>'+
      '<td>'+statusBadge(j.status)+'</td>'+
      '<td>'+esc(fmtDate(j.dateIn))+'</td>'+
      '<td class="r">'+peso(jobGross(j))+'</td>'+
      '<td class="r">'+(jobBalance(j)>0?'<span class="amber">'+peso(jobBalance(j))+'</span>':'—')+'</td></tr>';
  }).join('');
  return '<div class="card pad0"><table class="tbl click"><thead><tr>'+
    '<th>JO #</th><th>Plate</th><th>Vehicle</th><th>Stage</th><th>Status</th><th>Date in</th><th class="r">Bill</th><th class="r">Balance</th>'+
    '</tr></thead><tbody>'+rows+'</tbody></table></div>';
}
function jobsSearch(v){ JOB_Q=v; var el=document.getElementById('jobsBody'); if(el) el.innerHTML=jobsBodyHTML(); }
VIEWS.jobs = function(){
  var search='<input class="searchbox" id="jobsSearch" value="'+attr(JOB_Q)+'" oninput="jobsSearch(this.value)" placeholder="Search JO# / plate / owner / contact…" autocomplete="off">';
  return '<div class="page"><div class="page-head"><h1>Job Orders</h1><div class="row gap wrap">'+search+
    '<button class="btn primary" onclick="openIntake()">＋ New Ingress</button></div></div>'+
    '<div id="jobsBody">'+jobsBodyHTML()+'</div>'+
  '</div>';
};

/* ---- Job detail ----------------------------------------------------------- */
function stageStep(job){
  var stages=['Job Order','Post Job Report','Final Billing','Released'];
  var idx=stages.indexOf(job.stage);
  return '<div class="stepper">'+stages.map(function(s,i){
    var cls=i<idx?'done':i===idx?'cur':'';
    return '<div class="step '+cls+'"><span class="dot">'+(i<idx?'✓':(i+1))+'</span>'+esc(s)+'</div>';
  }).join('<span class="step-line"></span>')+'</div>';
}

VIEWS.job = function(id){
  var j = jobById(id) || S.jobs[0];
  if (!j) return emptyState('Job not found.');
  var bill = runningBill(j);
  return '<div class="page">'+
    '<div class="page-head"><div><a class="back" onclick="go(\'jobs\')">‹ Job Orders</a>'+
      '<h1>'+esc(j.no)+' · '+esc(j.plate)+' '+statusBadge(j.status)+'</h1></div>'+
      '<div class="row gap">'+jobPrintButtons(j)+
        (((typeof isAdminUser!=='function')||isAdminUser())?'<button class="btn danger ghost" onclick="deleteJobConfirm(\''+j.id+'\')">🗑 Delete</button>':'')+
      '</div></div>'+
    stageStep(j)+
    '<div class="cols">'+
      '<div class="colmain">'+
        jobStatusPanel(j)+
        jobLinesPanel(j)+
        jobAddlPanel(j)+
        jobInspectionPanel(j)+
        jobPhotosPanel(j)+
      '</div>'+
      '<div class="colside">'+
        jobBillPanel(j,bill)+
        jobAssignPanel(j)+
        jobDetailsPanel(j)+
        jobStagePanel(j,bill)+
      '</div>'+
    '</div>'+
  '</div>';
};

function jobPrintButtons(j){
  var btns='<button class="btn ghost" onclick="printJobOrder(\''+j.id+'\')">⎙ Job Order</button>';
  if (j.stage!=='Job Order') btns+='<button class="btn ghost" onclick="printPostJob(\''+j.id+'\')">⎙ Post Job Report</button>';
  if (j.stage==='Final Billing'||j.stage==='Released') btns+='<button class="btn ghost" onclick="printBilling(\''+j.id+'\')">⎙ Final Billing</button>';
  return btns;
}

/* ---- Status / clipboard panel --------------------------------------------- */
function jobStatusPanel(j){
  var log = (j.statusLog||[]).slice().reverse().map(function(e){
    return '<div class="log-row">'+statusBadge(e.code)+'<div class="log-body"><div class="log-note">'+esc(e.note||'')+'</div>'+
      '<div class="log-meta">'+esc(staffName(e.by))+' · '+esc(fmtDateTime(e.time))+'</div></div></div>';
  }).join('') || emptyState('No updates logged yet.');
  var due = isUpdateDue(j) ? '<span class="amber">⚑ Update due (clipboard checkpoint passed)</span>' : '';

    (due?'<div class="due-banner">'+due+'</div>':'')+
    '<div class="curstat">Current: '+statusBadge(j.status)+' <span class="muted">'+esc(STATUS[j.status]||'')+'</span></div>'+

function logUpdate(id){
  var j=jobById(id);

    { onOk:'saveUpdate', okText:'Log' });

var openModalCtx=null;
function saveUpdate(){
  var j=jobById(openModalCtx); if(!j) return;
  var code=val('luCode');
  j.status=code;
  j.statusLog.push({ time:new Date().toISOString(), code:code, by:val('luBy'), note:val('luNote') });

/* ---- Lines panel ---------------------------------------------------------- */
function runningBill(j){
  var parts=partsTotal(j.lines), labor=laborTotal(j.lines), addl=addlTotal(j);
  var base=round2(parts+labor+addl);          // VATable base = SRP total
  var vs=vatSplit(base,S);                      // exclusive: vat added on top
  var subtotal=vs.gross;                        // VATable + VAT (before discount)
  var disc=discountAmount(j);                    // taken off the total
  var gross=round2(subtotal-disc);              // Total Amount Due
  return { parts:parts, labor:labor, addl:addl, base:base, subtotal:subtotal, disc:disc, gross:gross,
    vatable:vs.vatable, vat:vs.vat, exempt:vs.exempt, paid:jobPaid(j), balance:jobBalance(j) };
}
function jobLinesPanel(j){
  // Once Final Billing is issued (OR # assigned) lines lock — but a user with the
  // 'billing_edit' permission can still edit them even after billing is done.
  var billed = (j.stage==='Final Billing' || j.stage==='Released');
  var locked = billed && !can('billing_edit');
  var rows = (j.lines||[]).map(function(l){
    return '<tr><td>'+chip(l.type==='part'?'Part':'Labor', l.type==='part'?'':'gold')+'</td>'+
      '<td>'+(l.sku?'<span class="muted small">'+esc(l.sku)+'</span> ':'')+esc(l.desc)+'</td><td class="r">'+num(l.qty)+'</td>'+
      '<td class="r">'+peso(l.price)+'</td><td class="r">'+peso(lineTotal(l))+'</td>'+
      '<td class="r">'+(locked?'':'<button class="ic" onclick="editLine(\''+j.id+'\',\''+l.id+'\')">✎</button>'+
        '<button class="ic" onclick="delLine(\''+j.id+'\',\''+l.id+'\')">✕</button>')+'</td></tr>';
  }).join('') || '<tr><td colspan="6" class="muted center">No lines yet.</td></tr>';
  return '<div class="card"><div class="card-head"><h2>Parts & Labor</h2>'+
    (locked?'':'<button class="btn sm primary" onclick="addLine(\''+j.id+'\')">＋ Add line</button>')+'</div>'+
    '<table class="tbl"><thead><tr><th>Type</th><th>Description</th><th class="r">Qty</th><th class="r">Price</th><th class="r">Total</th><th></th></tr></thead>'+
    '<tbody>'+rows+'</tbody></table></div>';
}
/* Line editor. Part lines: Qty → SKU (auto-fills Part Name / Net Price / SRP from
   the parts catalog, all editable) with full manual entry when no SKU is used.
   Labor lines: pick from the labor menu or free-text. */
function lineForm(l){
  l=l||{type:'part',qty:1,price:0,desc:''};
  return field('Type','<select id="lnType" onchange="lineTypeSwap()"><option value="part"'+(l.type==='part'?' selected':'')+'>Part</option><option value="labor"'+(l.type==='labor'?' selected':'')+'>Labor</option></select>')+
    '<div id="lnFields">'+ (l.type==='labor' ? laborFields(l) : partFields(l)) +'</div>';
}
function partFields(l){
  return '<div class="grid2">'+
    field('Qty','<input id="lnQty" type="number" step="0.5" value="'+attr(l.qty||1)+'">')+
    field('SKU','<input id="lnSku" value="'+attr(l.sku||'')+'" oninput="skuLookup()" placeholder="type SKU…" autocomplete="off">')+
    '</div>'+
    field('Part name','<input id="lnDesc" value="'+attr(l.desc||'')+'" placeholder="auto-fills from SKU, or type">')+
    '<div class="grid2">'+
    field('Net price','<input id="lnNet" type="number" step="0.01" value="'+attr(l.netPrice||0)+'">')+
    field('SRP','<input id="lnPrice" type="number" step="0.01" value="'+attr(l.price||0)+'">')+
    '</div><div id="skuMsg" class="muted small">'+catalogHint()+'</div>';
}
function laborFields(l){
  var laborOpts='<option value="">— free text —</option>'+S.labor.map(function(p){return '<option value="'+p.id+'" data-price="'+p.price+'" data-name="'+attr(p.name)+'"'+(l.ref===p.id?' selected':'')+'>'+esc(p.name)+'</option>';}).join('');
  return field('From menu','<select id="lnRef" onchange="laborPick()">'+laborOpts+'</select>')+
    field('Description','<input id="lnDesc" value="'+attr(l.desc||'')+'">')+
    '<div class="grid2">'+field('Qty','<input id="lnQty" type="number" step="0.5" value="'+attr(l.qty||1)+'">')+
    field('Price','<input id="lnPrice" type="number" step="0.01" value="'+attr(l.price||0)+'">')+'</div>';
}
function lineTypeSwap(){
  var t=val('lnType');
  document.getElementById('lnFields').innerHTML = (t==='labor') ? laborFields({}) : partFields({});
}
function catalogHint(){
  if (typeof CATALOG_STATE==='undefined') return '';
  if (CATALOG_STATE==='ready') return 'Catalog ready — type a SKU to auto-fill.';
  if (CATALOG_STATE==='loading') return 'Loading parts catalog…';
  return '';
}
function skuLookup(){
  var sku=(val('lnSku')||'').trim(); var msg=document.getElementById('skuMsg');
  if(!sku){ if(msg) msg.textContent=catalogHint(); return; }
  var hit = (typeof catalogLookup==='function') ? catalogLookup(sku) : null;
  if(hit){ setVal('lnDesc',hit.name); setVal('lnNet',hit.net); setVal('lnPrice',hit.srp); if(msg){ msg.textContent='✓ '+hit.name; msg.className='ok small'; } }
  else if(msg){ msg.textContent = (typeof CATALOG_STATE!=='undefined'&&CATALOG_STATE==='loading')?'Loading catalog…':'No match — enter the details manually.'; msg.className='muted small'; }
}
function laborPick(){ var sel=document.getElementById('lnRef'); var o=sel.options[sel.selectedIndex];
  if(o&&o.value){ setVal('lnDesc',o.getAttribute('data-name')); setVal('lnPrice',o.getAttribute('data-price')); } }
function addLine(id){
  lineCtx={job:id,line:null};
  openModal('Add lines', lineForm(), {
    footer:'<button class="btn ghost" onclick="closeModal()">Done</button>'+
      '<span style="flex:1"></span>'+
      '<button class="btn primary" onclick="saveLineMore()">Add line</button>' });
}
/* Save the line but KEEP the dialog open, reset for the next line — so you can
   add line after line without leaving the box. (Enter on the last field does this.) */
function saveLineMore(){
  var j=jobById(lineCtx.job); if(!j) return;
  var data=readLine();
  if(!data.desc){ toast(data.type==='part'?'Part name required':'Description required','err'); return; }
  data.id=uid('ln'); j.lines.push(data); persist();
  toast('Added · '+data.desc);
  render();                                   // refresh the lines table behind the dialog
  var body=document.querySelector('#modalRoot .modal-body');
  if(body){ body.innerHTML=lineForm({type:data.type}); }   // fresh form, same Type for fast repeats
  setTimeout(function(){ var f=document.querySelector('#modalRoot .modal-body input,#modalRoot .modal-body select'); if(f&&f.focus){ f.focus(); if(f.select){ try{f.select();}catch(_){} } } }, 20);
}
function editLine(id,lid){ var j=jobById(id); var l=j.lines.find(function(x){return x.id===lid;});
  openModal('Edit line', lineForm(l), { onOk:'saveLine' }); setTimeout(function(){lineCtx={job:id,line:lid};},10); }
var lineCtx=null;
function readLine(){
  var type=val('lnType');
  if(type==='labor'){
    return { type:'labor', ref:val('lnRef')||null, sku:'', netPrice:0, desc:val('lnDesc'), qty:Number(val('lnQty'))||0, price:Number(val('lnPrice'))||0 };
  }
  return { type:'part', ref:null, sku:(val('lnSku')||'').trim(), desc:val('lnDesc'),
    netPrice:Number(val('lnNet'))||0, qty:Number(val('lnQty'))||0, price:Number(val('lnPrice'))||0 };
}
function saveLine(){
  var j=jobById(lineCtx.job); var data=readLine();
  if(!data.desc){ toast(data.type==='part'?'Part name required':'Description required','err'); return; }
  if(lineCtx.line){ var l=j.lines.find(function(x){return x.id===lineCtx.line;}); Object.assign(l,data); }
  else { data.id=uid('ln'); j.lines.push(data); }
  persist(); closeModal(); render();
}
function delLine(id,lid){ var j=jobById(id); j.lines=j.lines.filter(function(x){return x.id!==lid;}); persist(); render(); }

/* Admin-only: delete an entire job order (with warning). */
function deleteJobConfirm(id){
  if (typeof isAdminUser==='function' && !isAdminUser()){ toast('Admins only','err'); return; }
  var j=jobById(id); if(!j) return;
  confirmModal('Delete this job order?',
    'This permanently deletes '+(j.no||'')+' ('+(j.plate||'')+') and everything in it — line items, status log, billing, payments and photos. This cannot be undone.',
    function(){
      S.jobs=S.jobs.filter(function(x){return x.id!==id;});
      persist(); closeModal(); toast('Job order deleted'); go('jobs');
    },'Delete job order', true);
}

function addAddl(id){

    field('Description','<input id="awDesc" placeholder="e.g. Replace cracked serpentine belt">')+

var awCtx=null;
function saveAddl(){
  var j=jobById(awCtx);
  j.addlWork.push({ desc:val('awDesc'), amount:Number(val('awAmt'))||0, reportedTo:val('awTo'), approved:checked('awApproved') });
  persist(); closeModal(); render();
}
function approveAddl(id,i){ var j=jobById(id); j.addlWork[i].approved=true; persist(); toast('Additional work approved'); render(); }
function delAddl(id,i){ var j=jobById(id); j.addlWork.splice(i,1); persist(); render(); }

function jobInspectionPanel(j){

    var on = cl.items&&cl.items[it];

  return '<div class="card"><div class="card-head"><h2>Vehicle Check-in</h2>'+

/* Lowest OR number that may still be issued — never below any already-issued OR,
   so a fresh allocator can never reuse a number. */
function orSeed(){
  var hi=0;
  (S.jobs||[]).forEach(function(x){ if(x&&x.orNumber){ var m=/(\d+)/.exec(String(x.orNumber)); if(m){ var v=Number(m[1]); if(v>hi) hi=v; } } });
  return Math.max(hi+1, Number(S.shop.orNext)||0, (Number((S.counters||{}).or)||0)+1, 1001);
}
/* Allocate the next OR number ATOMICALLY. In cloud mode a Firestore transaction on
   meta/orcounter hands out each number exactly once — even with several cashiers
   billing at the same instant there can be NO duplicates. Offline falls back to a
   local monotonic counter. */
function allocateOrNumber(){
  var seed = orSeed();
  if (typeof cloudOn==='function' && cloudOn() && typeof FB!=='undefined' && FB && FB.ready && FB.db && FB.user){
    var ref = FB.db.collection('meta').doc('orcounter');
    return FB.db.runTransaction(function(t){
      return t.get(ref).then(function(doc){
        var stored = (doc.exists && Number(doc.data().next)>0) ? Number(doc.data().next) : 0;
        var issue = Math.max(stored, seed);                 // never reuse / never go backward
        t.set(ref, { next: issue+1, updatedAt:new Date().toISOString() }, { merge:true });
        return issue;
      });
    }).then(function(issue){
      if(S.counters) S.counters.or=issue;                   // keep local mirrors current
      S.shop.orNext = issue+1;
      return 'OR-'+String(issue);
    });
  }
  if(!S.counters) S.counters={};
  var n = Math.max(Number(S.counters.or)||0, seed);
  S.counters.or = n; S.shop.orNext = n+1;
  return Promise.resolve('OR-'+String(n));
}
var _issuingOR={};
function advanceBilling(id){
  var j=jobById(id);
  if(!j || j.stage!=='Post Job Report' || j.orNumber) return;   // already issued / wrong stage
  if(_issuingOR[id]) return;                                     // in-flight guard (prevents double-click gaps)
  _issuingOR[id]=true;
  j.discount={ type:val('dscType')||j.discount.type, value:Number(val('dscVal'))||j.discount.value||0 };
  allocateOrNumber().then(function(orNo){
    j.orNumber=orNo; j.billedAt=new Date().toISOString(); j.stage='Final Billing';
    delete _issuingOR[id]; persist(); toast('Final Billing issued · '+orNo); render();
  }).catch(function(err){
    delete _issuingOR[id];
    toast('Could not assign OR number — please try again.'+(err&&err.message?' ('+err.message+')':''),'err');
  });
}

/* ---- QR code (optional cdnjs lib, graceful fallback) ---------------------- */
var QR_LIB_URL='https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js';
var _qrLoading=false, _qrReady=false;
function loadQR(cb){
  if (_qrReady || (typeof window!=='undefined' && window.QRCode)){ _qrReady=true; return cb(true); }
  if (typeof document==='undefined') return cb(false);
  if (_qrLoading){ setTimeout(function(){cb(_qrReady);},400); return; }
  _qrLoading=true;
  var s=document.createElement('script'); s.src=QR_LIB_URL;
  s.onload=function(){ _qrReady=true; cb(true); };
  s.onerror=function(){ _qrReady=false; cb(false); };
  document.head.appendChild(s);
}
function renderQR(elId, text){
  loadQR(function(ok){
    var el=document.getElementById(elId); if(!el) return;
    el.innerHTML='';
    if (ok && window.QRCode){ try{ new window.QRCode(el,{ text:text, width:180, height:180, colorDark:'#1D1D1F', colorLight:'#ffffff' }); return; }catch(e){} }
    el.innerHTML='<div class="qr-fallback"><div class="qr-x">QR</div><div class="muted small">Offline — encode this URL:</div><code class="qr-url">'+esc(text)+'</code></div>';
  });
}

/* tolerant field mapping for sync/import */
function mapPartRow(r){
  function pick(){ for(var i=0;i<arguments.length;i++){ var k=arguments[i]; if(r[k]!==undefined&&r[k]!=='') return r[k]; } return undefined; }
  var no=pick('partNo','part_no','sku','code','itemcode');
  var name=pick('name','description','desc','itemname','item');
  if(name===undefined&&no===undefined) return null;
  return { id:uid('pt'), partNo:String(no||name||''), name:String(name||no||''),
    price:Number(pick('price','srp','sellingprice','retail'))||0,
    cost:Number(pick('cost','buying_price','buyingprice','wholesale'))||0,
    stock:Number(pick('stock','quantity','qty','onhand'))||0,
    reorder:Number(pick('reorder','min','minimum','reorderpoint'))||0, source:'server' };
}
function importPartsFromArray(arr){
  var mapped=arr.map(mapPartRow).filter(Boolean);
  if(!mapped.length) return 0;
  S.parts=mapped; persist(); return mapped.length;
}
function parseCSV(text){
  var lines=text.split(/\r?\n/).filter(function(l){return l.trim();});
  if(!lines.length) return [];
  var head=lines[0].split(',').map(function(h){return h.trim().toLowerCase().replace(/\s+/g,'');});
  return lines.slice(1).map(function(l){
    var cells=l.split(','); var o={}; head.forEach(function(h,i){ o[h]=(cells[i]||'').trim(); }); return o;
  });
}
function importPartsText(text){
  text=text.trim();
  try { var j=JSON.parse(text); if(Array.isArray(j)) return importPartsFromArray(j); }
  catch(e){}
  return importPartsFromArray(parseCSV(text));
}

  openModal('Import parts (CSV or JSON)',

function syncPartsNow(){
  var url=S.shop.partsApi; if(!url){toast('Set parts API URL in Settings','err');return;}
  toast('Syncing…');
  fetch(url).then(function(r){return r.json();}).then(function(data){
    var arr=Array.isArray(data)?data:(data.parts||data.data||[]);
    var n=importPartsFromArray(arr);

function releasedJobs(){ return S.jobs.filter(function(j){return j.stage==='Released';}); }
function billedJobs(){ return S.jobs.filter(function(j){return j.stage==='Final Billing'||j.stage==='Released';}); }

function jobCostOfParts(j){
  return round2((j.lines||[]).reduce(function(s,l){
    if(l.type!=='part') return s;
    var unitCost = (l.netPrice!=null && l.netPrice!=='') ? Number(l.netPrice)||0 : (l.ref ? ((partById(l.ref)||{}).cost||0) : 0);
    return s + unitCost*(Number(l.qty)||0);
  },0));
}

/* Commission across a set of jobs.
   Mechanics: labor×rate÷#mechs split evenly (the pool).
   Service Adviser on the job: its own labor×rate (same 5% rate, not split).
   Other roles: their configured commissionBase/rate. */
function commissionTable(jobs){
  var map={};
  function add(id,amt){ if(!id||id==='TBA') return; var s=staffById(id); if(!s) return;
    if(!commissionEligible(s)) return;                                  // toggled out of commission payout
    if(!map[id]) map[id]={ name:s.name, role:s.role, amount:0 }; map[id].amount=round2(map[id].amount+amt); }
  jobs.forEach(function(j){
    // Shop-wide commission: labor × shop rate, split evenly among everyone assigned.
    var cm=jobLaborCommissionMap(j,S);
    Object.keys(cm).forEach(function(id){ add(id, cm[id]); });
  });
  return Object.keys(map).map(function(k){return map[k];}).filter(function(c){return c.amount>0;}).sort(function(a,b){return b.amount-a.amount;});
}
