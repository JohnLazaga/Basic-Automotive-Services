/* ---- Productivity (mechanic KPI) ------------------------------------------ */
/* ---- Productivity period (all / today / week / month / custom) ----------- */
var PROD_PERIOD='month', PROD_FROM='', PROD_TO='';
function prodRange(){
  var today=todayISO();
  if(PROD_PERIOD==='today') return { from:today, to:today };
  if(PROD_PERIOD==='week'){ var d=new Date(); var dow=(d.getDay()+6)%7; var mon=new Date(d); mon.setDate(d.getDate()-dow); return { from:todayISO(mon), to:today }; }
  if(PROD_PERIOD==='month') return { from:today.slice(0,7)+'-01', to:today };
  if(PROD_PERIOD==='custom') return { from:PROD_FROM||'0000-01-01', to:PROD_TO||'9999-12-31' };
  return { from:'0000-01-01', to:'9999-12-31' };  // all
}
function jobsInProdPeriod(jobs){
  var r=prodRange();
  return jobs.filter(function(j){ var d=(j.billedAt||'').slice(0,10); return d && d>=r.from && d<=r.to; });
}
function setProd(p){
  PROD_PERIOD=p;
  if(p==='custom' && !PROD_FROM){ PROD_FROM=todayISO().slice(0,7)+'-01'; PROD_TO=todayISO(); }
  render();
}
function prodPeriodLabel(){
  if(PROD_PERIOD==='all') return 'All time';
  if(PROD_PERIOD==='today') return 'Today · '+fmtDate(todayISO());
  var r=prodRange(); return fmtDate(r.from)+' – '+fmtDate(r.to);
}

/* KPI listing order — every staff member shown, sorted by role rank. Roles not
   listed (e.g. Parts Salesman) sort last but are still included. */
var KPI_ROLE_ORDER=['SV','Secretary','SA','SM','Mechanic'];
function kpiRoleRank(role){ var i=KPI_ROLE_ORDER.indexOf(role); return i<0?KPI_ROLE_ORDER.length:i; }
VIEWS.productivity = function(){
  var jobs=jobsInProdPeriod(billedJobs());
  var staff=(S.staff||[]).slice().sort(function(a,b){ return kpiRoleRank(a.role)-kpiRoleRank(b.role) || String(a.name||'').localeCompare(String(b.name||'')); });
  var byId={};
  var list=staff.map(function(s){ var r={ id:s.id, name:s.name, role:s.role, on:(s.commission!==false), jobs:0, hours:0, labor:0, commission:0 }; byId[s.id]=r; return r; });
  jobs.forEach(function(j){
    // Evaluation figure: pool split among EVERYONE assigned, ignoring the payout toggle.
    var cm=jobLaborCommissionMapAll(j,S); var lab=laborTotal(j.lines);
    var mechs=(j.mechanicIds||[]).filter(function(x){return x&&x!=='TBA';});
    // every distinct staff assigned in ANY capacity — job count
    var assigned=[]; mechs.concat([j.saId,j.assessedBy,j.partsSalesman]).forEach(function(x){ if(x&&x!=='TBA'&&assigned.indexOf(x)<0) assigned.push(x); });
    assigned.forEach(function(id){ var r=byId[id]; if(r) r.jobs++; });
    // job hours & labor billed are mechanic productivity metrics — split among mechanics
    mechs.forEach(function(mid){ var r=byId[mid]; if(!r) return; r.hours=round2(r.hours+(Number(j.jobHours)||0)/mechs.length); r.labor=round2(r.labor+lab/mechs.length); });
    Object.keys(cm).forEach(function(id){ var r=byId[id]; if(r) r.commission=round2(r.commission+cm[id]); });
  });
  var rows=list.map(function(m){
    var toggle='<label class="switch" title="Include in commission payout"><input type="checkbox" '+(m.on?'checked':'')+
      ' onchange="toggleStaffCommission(\''+m.id+'\',this.checked)"><span class="track"><span class="knob"></span></span></label>';
    var commCell = m.on ? '<b>'+peso(m.commission)+'</b>'
      : '<span class="muted" title="Evaluation only — excluded from payout">'+peso(m.commission)+'</span>';
    return '<tr><td><b>'+esc(m.name)+'</b> <span class="muted small">'+esc(roleLabel(m.role))+'</span></td><td class="r">'+m.jobs+'</td><td class="r">'+num(m.hours)+'</td>'+
      '<td class="r">'+peso(m.labor)+'</td><td class="r">'+peso(m.jobs?round2(m.labor/m.jobs):0)+'</td><td class="r">'+commCell+'</td><td class="center">'+toggle+'</td></tr>';
  }).join('');
  var commBars=list.filter(function(m){return m.commission>0;}).map(function(m){return {label:m.name,value:m.commission};});
  var seg=['all','today','week','month','custom'].map(function(p){
    var lab={all:'All time',today:'Today',week:'This week',month:'This month',custom:'Custom'}[p];
    return '<button class="seg-b'+(PROD_PERIOD===p?' on':'')+'" onclick="setProd(\''+p+'\')">'+lab+'</button>';
  }).join('');
  var custom = PROD_PERIOD==='custom' ? '<div class="row gap" style="align-items:center">'+
    '<input type="date" value="'+attr(PROD_FROM)+'" onchange="PROD_FROM=this.value;render()"> <span class="muted">to</span> '+
    '<input type="date" value="'+attr(PROD_TO)+'" onchange="PROD_TO=this.value;render()"></div>' : '';
  return '<div class="page"><div class="page-head"><h1>Staff Productivity</h1>'+
    '<button class="btn primary" onclick="printPayout()">⎙ Payout sheet</button></div>'+
    '<div class="row gap" style="align-items:center;flex-wrap:wrap"><div class="seg">'+seg+'</div>'+custom+
      '<span class="muted small">'+esc(prodPeriodLabel())+'</span></div>'+
    '<p class="muted small mt8">Commission is each staff member’s own admin-set rate × the job’s labor (set per person on the Staff page). The Commission column is the <b>evaluation</b> figure — shown even for staff switched off (greyed). The <b>Payout sheet</b> pays only staff with <b>Payout</b> on.</p>'+
    '<div class="card pad0"><table class="tbl"><thead><tr><th>Staff</th><th class="r">Jobs</th><th class="r">Job hrs</th><th class="r">Labor billed</th><th class="r">Avg/job</th><th class="r">Commission</th><th class="center">Payout</th></tr></thead><tbody>'+(rows||'<tr><td colspan="7" class="muted center">No staff.</td></tr>')+'</tbody></table></div>'+
    '<div class="card"><h2>Commission by staff</h2>'+(commBars.length?bars(commBars,peso):emptyState('No commissions in this period.'))+'</div></div>';
};

/* ---- Receivables (A/R) ---------------------------------------------------- */
function arJobs(){ return S.jobs.filter(function(j){return (j.stage==='Final Billing'||j.stage==='Released') && jobBalance(j)>0.001;}); }
function agingBucket(days){ if(days<=30) return '0-30'; if(days<=60) return '31-60'; if(days<=90) return '61-90'; return '90+'; }
VIEWS.receivables = function(){
  var ar=arJobs();
  var buckets={'0-30':0,'31-60':0,'61-90':0,'90+':0};
  var byCust={};
  ar.forEach(function(j){ var days=j.billedAt?Math.max(0,daysBetween(j.billedAt, new Date().toISOString())):0;
    var b=agingBucket(days); var bal=jobBalance(j); buckets[b]=round2(buckets[b]+bal);
    var key=j.owner||j.plate; (byCust[key]=byCust[key]||{name:key,total:0,jobs:[]}); byCust[key].total=round2(byCust[key].total+bal);
    byCust[key].jobs.push({ j:j, days:days, bucket:b, bal:bal }); });
  var total=round2(Object.keys(buckets).reduce(function(s,k){return s+buckets[k];},0));
  var custList=Object.keys(byCust).map(function(k){return byCust[k];}).sort(function(a,b){return b.total-a.total;});
  var custHTML=custList.length? custList.map(function(c){
    return '<div class="card"><div class="card-head"><h2>'+esc(c.name)+'</h2><div class="row gap"><b>'+peso(c.total)+'</b>'+
      '<button class="btn sm ghost" onclick="printStatement(\''+attr(encodeURIComponent(c.name))+'\')">⎙ Statement</button></div></div>'+
      '<table class="tbl sm"><thead><tr><th>JO #</th><th>Billed</th><th>Age</th><th>Bucket</th><th class="r">Balance</th><th></th></tr></thead><tbody>'+
      c.jobs.map(function(x){return '<tr><td>'+esc(x.j.no)+'</td><td>'+esc(fmtDate(x.j.billedAt))+'</td><td>'+x.days+'d</td><td>'+chip(x.bucket,x.bucket==='90+'?'due':'')+'</td>'+
        '<td class="r">'+peso(x.bal)+'</td><td class="r"><button class="btn xs primary" onclick="collectAR(\''+x.j.id+'\')">Collect</button></td></tr>';}).join('')+
      '</tbody></table></div>';
  }).join('') : emptyState('No outstanding receivables.');
  return '<div class="page"><div class="page-head"><h1>Receivables (A/R)</h1></div>'+
    '<div class="kpis">'+kpi('Total A/R',peso(total))+kpi('0–30',peso(buckets['0-30']))+kpi('31–60',peso(buckets['31-60']))+
      kpi('61–90',peso(buckets['61-90']))+kpi('90+',peso(buckets['90+']),buckets['90+']>0?'<span class="amber">overdue</span>':'')+'</div>'+
    custHTML+'</div>';
};
function collectAR(id){
  var j=jobById(id); var bal=jobBalance(j);
  openModal('Collect payment — '+j.no,
    '<div class="grid2">'+field('Amount','<input id="arAmt" type="number" step="0.01" value="'+attr(bal)+'">')+
    field('Method','<select id="arMethod"><option>Cash</option><option>GCash</option><option>Card</option><option>Bank transfer</option></select>')+'</div>',
    { onOk:'saveAR', okText:'Record' }); setTimeout(function(){arCtx=id;},10);
}
var arCtx=null;
function saveAR(){ var j=jobById(arCtx); var amt=Number(val('arAmt'))||0; if(amt<=0){toast('Enter amount','err');return;}
  j.payments.push({ amount:amt, method:val('arMethod'), date:new Date().toISOString() });
  persist(); closeModal(); toast('Payment recorded'); render(); }

function saveShop(){
  var sh=S.shop;
  if(document.getElementById('shName')){ sh.name=val('shName'); sh.businessStyle=val('shStyle'); sh.address=val('shAddr');
    sh.contact=val('shContact'); sh.tin=val('shTin');
    sh.vatRate=Number(val('shVatRate'))||12; sh.vatReg=checked('shVatReg'); }
  if(document.getElementById('shPortal')) sh.portalUrl=val('shPortal');
  if(document.getElementById('shComm')) sh.mechCommissionRate=Number(val('shComm'))||0;
  if(document.getElementById('shSource')){ sh.partsSource=val('shSource'); sh.partsApi=val('shApi'); }
  persist(); toast('Settings saved'); render();
}
function addBay(){ var n=val('bayNew'); if(!n) return; S.bays.push({ id:uid('bay'), name:n }); persist(); render(); }
function delBay(id){ S.bays=S.bays.filter(function(b){return b.id!==id;}); persist(); render(); }
function addCheckpoint(){ var t=val('cpNew'); if(!t) return; S.shop.checkpoints.push(t); S.shop.checkpoints.sort(); persist(); render(); }
function delCheckpoint(i){ S.shop.checkpoints.splice(i,1); persist(); render(); }

function exportBackup(){
  var data=JSON.stringify(S,null,2);
  if(typeof document==='undefined') return data;
  var blob=new Blob([data],{type:'application/json'});
  var a=document.createElement('a'); a.href=URL.createObjectURL(blob);
  a.download='basic_jmsi_backup_'+todayISO()+'.json'; a.click();
  toast('Backup downloaded');
}
function clearAllData(){
  confirmModal('Clear all data?','This wipes every record to a blank shop. Export a backup first if needed.',function(){
    S=blankShop(); persist(); toast('All data cleared'); go('board');
  },'Clear everything',true);
}
function blankShop(){
  var s=seedState();
  s.staff=[]; s.bays=[]; s.parts=[]; s.labor=[]; s.vehicles=[]; s.estimates=[]; s.jobs=[]; s.appointments=[]; s.purchaseOrders=[];
  s.counters={ est:0, jo:0, or:1000, po:0 };
  return s;
}

/* ============================================================================
   PART 11 — Cloud (Firebase): init, auth gate, login screen.
   Phase 2 increment 1: authentication foundation. Data still loads locally
   after sign-in; the Firestore data-layer swap is the next increment.
   All Firebase calls happen inside functions invoked at boot (browser only),
   never at module load — so the Node test bundle is unaffected.
   ========================================================================== */

var FB = { app:null, auth:null, db:null, storage:null, ready:false, user:null };

function cloudOn(){ return (typeof CLOUD_ENABLED!=='undefined') && CLOUD_ENABLED; }

function initFirebase(){
  if (FB.ready) return true;
  if (typeof firebase==='undefined' || typeof FIREBASE_CONFIG==='undefined') return false;
  try {
    FB.app = firebase.apps && firebase.apps.length ? firebase.app() : firebase.initializeApp(FIREBASE_CONFIG);
    FB.auth = firebase.auth();
    FB.db = firebase.firestore();
    try { FB.storage = firebase.storage(); } catch(e){}
    // offline cache (best-effort; ignored if unsupported / multi-tab)
    try { FB.db.enablePersistence({ synchronizeTabs:true }).catch(function(){}); } catch(e){}
    FB.ready = true;
    return true;
  } catch(e){ console.error('Firebase init failed:', e); return false; }
}

/* Entry point from boot() when cloud is enabled.
   Paints the login screen IMMEDIATELY (no Firebase needed to draw it), then
   waits for the deferred Firebase SDK to finish loading before wiring auth.
   This keeps first paint fast on mobile — the SDK downloads in the background. */
function cloudStart(){
  renderLogin(null, null, true);              // instant first paint
  whenFirebaseReady(function(ok){
    if (!ok){
      renderCloudError('Couldn’t load the sign-in service.',
        'Check your internet connection and reload.');
      return;
    }
    if (!initFirebase()){
      renderCloudError('Firebase failed to initialize.', 'The configuration may be incomplete.');
      return;
    }
    FB.auth.onAuthStateChanged(function(user){
      FB.user = user;
      if (user) onSignedIn(user);
      else renderLogin();
    });
  });
}
/* Poll briefly for the deferred Firebase SDK to become available. */
function whenFirebaseReady(cb){
  if (typeof window==='undefined') return cb(false);
  var tries=0;
  (function check(){
    if (typeof firebase!=='undefined' && firebase.auth && firebase.firestore) return cb(true);
    if (tries++ > 150) return cb(false);     // ~15s ceiling
    setTimeout(check, 100);
  })();
}

async function onSignedIn(user){
  renderCloudLoading();
  // 1) Resolve this user's account & role (bootstraps first Admin).
  try {
    await loadCurrentUser(user);
  } catch(e){
    if (e.code==='not-provisioned'){
      await FB.auth.signOut(); renderLogin('This account isn’t set up yet. Ask your administrator to add you.','err'); return;
    }
    if (e.code==='inactive'){
      await FB.auth.signOut(); renderLogin('Your account has been disabled. Contact your administrator.','err'); return;
    }
    console.error('account load failed', e);
    renderCloudError('Sign-in problem.', (e&&e.message)||'Please try again.'); return;
  }
  // 2) Load shop data.
  try {
    await cloudLoadAll();
  } catch(e){
    console.error('cloud load failed', e);
    renderCloudError('Couldn’t load shop data.', (e&&e.message)||'Check your connection and reload.');
    return;
  }
  applyTheme((S.shop && S.shop.theme) || 'light');
  cloudSubscribe();
  render();
  updateUserChip();
  if (typeof loadCatalog==='function') loadCatalog();   // preload parts catalog in the background
}

function renderCloudLoading(){
  var app=(typeof document!=='undefined') && document.getElementById('app'); if(!app) return;
  app.innerHTML='<div class="login-bg"><div class="login-card">'+
    '<img class="login-logo" src="'+LOGO_LOCKUP+'" alt="Basic by JMSI"/>'+
    '<div class="login-sub">Loading shop data…</div>'+
    '<div class="cloud-spin"></div></div></div>';
}

/* ============================================================================
   Firestore data layer (increment 2.2)
   - One-time migration of current local data when the cloud is empty.
   - Load all collections into S; keep S as the in-memory working cache.
   - Real-time listeners merge remote changes (skipping local echoes).
   - Writes go through cloudPersist(): diff S vs last snapshot, upsert/delete.
   - Job photos are uploaded to Firebase Storage so docs stay under 1 MB.
   ========================================================================== */
var COLLECTIONS = ['staff','bays','parts','labor','vehicles','estimates','jobs','appointments','purchaseOrders'];
var _cloudSnap = {};       /* {collection: {id: jsonString}} — for diffing */
var _metaSnap = { shop:null, counters:null };  /* last-synced meta docs */
var _cloudSubs = [];       /* unsubscribe fns */
var _applyingRemote = false;

function plain(o){ return JSON.parse(JSON.stringify(o)); }          /* drops undefined/functions */
function snapMap(arr){ var m={}; (arr||[]).forEach(function(r){ m[r.id]=JSON.stringify(r); }); return m; }
function modalOpen(){ return typeof document!=='undefined' && !!document.querySelector('#modalRoot .modal'); }

async function cloudLoadAll(){
  // is the cloud already populated?
  var shopDoc = await FB.db.collection('meta').doc('shop').get();
  if (!shopDoc.exists){
    // empty cloud → migrate from current local data (or a fresh seed)
    var raw = await Storage.get(STORE_KEY);
    var base = null; try { base = raw ? JSON.parse(raw) : null; } catch(e){}
    if (!base || base.version!==2) base = seedState();
    await cloudMigrate(base);
  }
  S = await cloudFetchState();
  ensureStateShape();
  rememberSnap();
}

function ensureStateShape(){
  COLLECTIONS.forEach(function(c){ if(!Array.isArray(S[c])) S[c]=[]; });
  if(!S.counters) S.counters={ est:0, jo:0, or:1000, po:0 };
  if(!S.shop) S.shop=seedState().shop;
  if(!S.shop.theme) S.shop.theme='light';
}

async function cloudFetchState(){
  var st = seedState();              // defaults for shop/counters + array shape
  var shopDoc = await FB.db.collection('meta').doc('shop').get();
  if (shopDoc.exists) st.shop = Object.assign(st.shop, shopDoc.data());
  var cntDoc = await FB.db.collection('meta').doc('counters').get();
  if (cntDoc.exists) st.counters = Object.assign(st.counters, cntDoc.data());
  for (var i=0;i<COLLECTIONS.length;i++){
    var c = COLLECTIONS[i];
    var snap = await FB.db.collection(c).get();
    st[c] = snap.docs.map(function(d){ return d.data(); });
  }
  return st;
}

async function cloudMigrate(base){
  await FB.db.collection('meta').doc('shop').set(plain(base.shop||{}));
  await FB.db.collection('meta').doc('counters').set(plain(base.counters||{est:0,jo:0,or:1000,po:0}));
  for (var i=0;i<COLLECTIONS.length;i++){
    var c = COLLECTIONS[i]; var arr = base[c]||[];
    for (var j=0;j<arr.length;j++){
      var rec = arr[j]; if (c==='jobs') await uploadJobPhotos(rec);
      await FB.db.collection(c).doc(rec.id).set(plain(rec));
    }
  }
}

async function cloudFetchState_noop(){}  /* reserved */

/* ---- Write path: diff S against last snapshot, sync changes -------------- */
async function cloudPersist(){
  if (!FB.ready || !FB.user || _applyingRemote) return;
  var amAdmin = !!(typeof CURRENT_USER!=='undefined' && CURRENT_USER && CURRENT_USER.isAdmin);
  // meta/shop (settings + permissions) is ADMIN-ONLY at the DB level. Only an
  // admin attempts it; everyone else just acknowledges the change locally so it
  // is NOT retried — a denied write here must never block the data writes below.
  var shopJSON = JSON.stringify(S.shop);
  if (shopJSON !== _metaSnap.shop){
    if (amAdmin){ try { await FB.db.collection('meta').doc('shop').set(plain(S.shop)); } catch(e){ console.error('meta/shop', e); } }
    _metaSnap.shop = shopJSON;
  }
  var cntJSON = JSON.stringify(S.counters);
  if (cntJSON !== _metaSnap.counters){
    try { await FB.db.collection('meta').doc('counters').set(plain(S.counters)); _metaSnap.counters = cntJSON; } catch(e){ console.error('counters', e); }
  }
  for (var i=0;i<COLLECTIONS.length;i++){
    var c = COLLECTIONS[i];
    var cur = {}; (S[c]||[]).forEach(function(r){ cur[r.id]=r; });
    var prev = _cloudSnap[c] || (_cloudSnap[c]={});
    // upserts (new or changed) — each isolated so one failure never aborts the rest
    var ids = Object.keys(cur);
    for (var k=0;k<ids.length;k++){
      var id = ids[k], rec = cur[id], js = JSON.stringify(rec);
      if (prev[id] === js) continue;                            // unchanged
      try {
        if (c==='jobs') await uploadJobPhotos(rec);             // relocate base64 → Storage
        await FB.db.collection(c).doc(id).set(plain(rec));
        prev[id] = js;                                          // mark synced only on success
      } catch(e){ console.error('save '+c+'/'+id, e); }         // keep stale -> retried next save
    }
    // deletes (gone from S)
    var prevIds = Object.keys(prev);
    for (var d=0; d<prevIds.length; d++){ var did=prevIds[d];
      if(!cur[did]){ try { await FB.db.collection(c).doc(did).delete(); delete prev[did]; } catch(e){ console.error('del '+c+'/'+did, e); } }
    }
  }
}

function rememberSnap(){
  COLLECTIONS.forEach(function(c){ _cloudSnap[c]=snapMap(S[c]); });
  _metaSnap.shop = JSON.stringify(S.shop);
  _metaSnap.counters = JSON.stringify(S.counters);
}

/* ---- Photos → Firebase Storage ------------------------------------------- */
async function uploadJobPhotos(job){
  if (!job || !Array.isArray(job.photos) || !FB.storage) return;
  for (var i=0;i<job.photos.length;i++){
    var p = job.photos[i];
    if (p.url || !p.data) continue;                            // already uploaded / nothing to do
    try {
      var ref = FB.storage.ref('photos/'+job.id+'/'+p.id+'.jpg');
      await ref.putString(p.data, 'data_url');
      var url = await ref.getDownloadURL();
      job.photos[i] = { id:p.id, url:url, caption:p.caption||'', ts:p.ts };
    } catch(e){ console.error('photo upload failed', e); /* keep base64 as fallback */ }
  }
}

/* ---- Real-time listeners ------------------------------------------------- */
function cloudSubscribe(){
  cloudUnsub();
  COLLECTIONS.forEach(function(c){
    var u = FB.db.collection(c).onSnapshot(function(snap){
      if (snap.metadata.hasPendingWrites) return;             // ignore our own local writes
      _applyingRemote = true;
      S[c] = snap.docs.map(function(d){ return d.data(); });
      _cloudSnap[c] = snapMap(S[c]);
      _applyingRemote = false;
      if (!modalOpen()) render();
    }, function(err){ console.error('listener '+c, err); });
    _cloudSubs.push(u);
  });
  var um = FB.db.collection('meta').onSnapshot(function(snap){
    if (snap.metadata.hasPendingWrites) return;
    snap.docs.forEach(function(d){
      if (d.id==='shop'){ S.shop = Object.assign(S.shop||{}, d.data()); _metaSnap.shop = JSON.stringify(S.shop); }
      if (d.id==='counters'){ S.counters = Object.assign(S.counters||{}, d.data()); _metaSnap.counters = JSON.stringify(S.counters); }
    });
    if (!modalOpen()) render();
  });
  _cloudSubs.push(um);
}
function cloudUnsub(){ _cloudSubs.forEach(function(u){ try{u();}catch(e){} }); _cloudSubs=[]; }

function friendlyAuthError(e){

  if(c.indexOf('too-many-requests')>=0) return 'Too many attempts. Please wait a moment and try again.';

/* ============================================================================
   PART 12 — RBAC: individual staff accounts, roles, permission matrix,
   and the Admin "Accounts & Roles" screen.

   Enforcement is at the UI layer (nav, buttons, sensitive fields). Firestore
   rules currently allow any signed-in staff; database-level per-role hardening
   is a later step. can() defaults to TRUE when no user is loaded (local/dev/
   tests) so the offline build and the Node tests are unaffected.
   ========================================================================== */

var CURRENT_USER = null;     // {uid,email,name,role,isAdmin,active}
var ACCOUNTS = null;         // cached users list for the Accounts screen
var _accountsLoading = false;

var ROLE_LIST = ['SV','SA','SM','Mechanic','Parts Salesman','Secretary'];

/* Capabilities that gate features (baseline board/jobs/vehicles are always on). */
var CAPS = [
  { key:'appointments', label:'Appointments' },

  { key:'receivables',  label:'Receivables (A/R)' },
  { key:'reports',      label:'Reports' },
  { key:'dailyclose',   label:'Daily Close' },
  { key:'productivity', label:'Productivity & commissions' },
  { key:'parts_manage', label:'Parts / Labor / PO' },
  { key:'staff_manage', label:'Staff & accounts' },
  { key:'settings',     label:'Settings' },
  { key:'delete',       label:'Delete / clear data' }
];

/* Default matrix (Admin always has everything via isAdmin). Admin-editable. */
var DEFAULT_PERMS = {
  SV:               { appointments:1, estimates:1, prices:1, part_cost:1, discounts:1, billing:1, billing_edit:1, receivables:1, reports:1, dailyclose:1, parts_manage:1 },
  SA:               { appointments:1, estimates:1, prices:1, billing:1, receivables:1 },

  'Parts Salesman': { prices:1, parts_manage:1 },
  Secretary:        { appointments:1, prices:1, billing:1, receivables:1 }
};

function permsMatrix(){
  return (S && S.shop && S.shop.permissions) ? S.shop.permissions : DEFAULT_PERMS;
}
function isAdminUser(){ return !!(CURRENT_USER && CURRENT_USER.isAdmin); }

/* The single access check used everywhere. */
function can(cap){
  if (typeof CURRENT_USER==='undefined' || !CURRENT_USER) return true; // pre-auth / local / tests
  if (CURRENT_USER.isAdmin) return true;
  if (!cap) return true;                                                // baseline feature
  var rp = permsMatrix()[CURRENT_USER.role] || {};
  return !!rp[cap];
}

/* ---- Sign-in: load this user's account, bootstrapping the first Admin ----- */
async function loadCurrentUser(user){
  var ref = FB.db.collection('users').doc(user.uid);
  var doc = await ref.get();
  if (doc.exists){
    var d = doc.data();
    if (d.active === false){ var e1=new Error('inactive'); e1.code='inactive'; throw e1; }
    CURRENT_USER = Object.assign({ uid:user.uid, email:user.email }, d);
    return;
  }
  // No account doc yet — first ever user becomes Admin (bootstrap).
  var any = await FB.db.collection('users').limit(1).get();
  if (any.empty){
    CURRENT_USER = { uid:user.uid, email:user.email, name:user.email, role:'SV', isAdmin:true, active:true };
    await ref.set({ email:user.email, name:user.email, role:'SV', isAdmin:true, active:true, createdAt:new Date().toISOString() });
    return;
  }
  CURRENT_USER = null;
  var e2 = new Error('not-provisioned'); e2.code='not-provisioned'; throw e2;
}

function getSecondaryApp(){

/* Staff log in with a USERNAME + a password the admin sets (no email needed).
   Internally each username maps to a synthetic email for Firebase Auth.
   The owner still signs in with their real email (kept for the isOwner rule). */

function usernameToEmail(u){ return String(u||'').trim().toLowerCase().replace(/[^a-z0-9_.\-]/g,'') + '@' + LOGIN_DOMAIN; }
function loginIdToEmail(id){ id=String(id||'').trim(); return id.indexOf('@')>=0 ? id : usernameToEmail(id); }
function cleanUsername(u){ return String(u||'').trim().toLowerCase().replace(/[^a-z0-9_.\-]/g,''); }

  var name=val('acName').trim(), username=cleanUsername(val('acUser')), pass=val('acPass'), role=val('acRole'), isAdmin=checked('acAdmin');

/* Role-permission editing: changes are held in a draft until Save. */
var PERM_EDIT=false, PERM_DRAFT=null;
function permEditOn(){ PERM_EDIT=true; PERM_DRAFT=JSON.parse(JSON.stringify(permsMatrix())); render(); }

  if(!PERM_DRAFT) return;

  else {
    var rows = ACCOUNTS.map(function(u){
      var me = CURRENT_USER && CURRENT_USER.uid===u.uid;
      return '<tr><td><b>'+esc(u.name||u.username||u.email)+'</b>'+(me?' <span class="chip">you</span>':'')+'<div class="muted small">'+esc(u.username?('@'+u.username):u.email)+'</div></td>'+
        '<td>'+(u.isAdmin?chip('Admin','gold'):chip(roleLabel(u.role)))+'</td>'+
        '<td>'+(u.active===false?chip('Disabled'):chip('Active','ok'))+'</td>'+
        '<td class="r">'+
          '<button class="btn xs" onclick="editAccountDialog(\''+u.uid+'\')">✎ Edit</button> '+
          '<button class="btn xs ghost" onclick="passwordDialog(\''+u.uid+'\')">🔑 Password</button>'+
        '</td></tr>';
    }).join('');
    accHTML = '<div class="card pad0"><table class="tbl"><thead><tr><th>Staff</th><th>Role</th><th>Status</th><th class="r">Actions</th></tr></thead><tbody>'+rows+'</tbody></table></div>';
  }

  var m = PERM_EDIT ? PERM_DRAFT : permsMatrix();
  var head = '<tr><th>Capability</th>'+ROLE_LIST.map(function(r){return '<th class="r">'+esc(roleLabel(r))+'</th>';}).join('')+'</tr>';
  var body = CAPS.map(function(c){
    return '<tr><td>'+esc(c.label)+'</td>'+ROLE_LIST.map(function(r){
      var on=!!(m[r]&&m[r][c.key]);
      return '<td class="r"><input type="checkbox" '+(on?'checked':'')+(PERM_EDIT?'':' disabled')+' onchange="permDraftToggle(\''+r+'\',\''+c.key+'\',this.checked)"></td>';
    }).join('')+'</tr>';
  }).join('');
  var permBtns = PERM_EDIT
    ? '<button class="btn sm primary" onclick="permSave()">Save</button>'+
      '<button class="btn sm ghost" onclick="permCancel()">Cancel</button>'+
      '<button class="btn sm ghost" onclick="permResetDraft()">Reset to defaults</button>'
    : '<button class="btn sm" onclick="permEditOn()">✎ Edit</button>';

  return '<div class="page"><div class="page-head"><h1>Accounts & Roles</h1>'+
    '<button class="btn primary" onclick="addAccountDialog()">＋ Add staff account</button></div>'+
    '<h2 class="sec">Staff accounts</h2>'+accHTML+
    '<div class="row gap sec" style="align-items:center"><h2 style="margin:0">Role permissions</h2>'+permBtns+
      (PERM_EDIT?'<span class="rolebadge admin">editing</span>':'')+'</div>'+
    '<p class="muted small">Admins always have full access. '+(PERM_EDIT?'Tick what each role can do, then <b>Save</b> (or Cancel to discard).':'Click <b>Edit</b> to change what each role can do.')+'</p>'+
    '<div class="card pad0"><table class="tbl perm"><thead>'+head+'</thead><tbody>'+body+'</tbody></table></div>'+
  '</div>';
};

    '<div style="font-size:34px">🔒</div>'+

    '<p class="muted">You don’t have permission to view '+esc(what||'this')+'. Ask your administrator if you need access.</p>'+

/* Map a route to the capability it requires (for the renderView guard). */
var VIEW_CAP = {
  appointments:'appointments', estimates:'estimates', estimate:'estimates',
  reports:'reports', dailyclose:'dailyclose', productivity:'productivity', receivables:'receivables',
  parts:'parts_manage', labor:'parts_manage', purchaseorders:'parts_manage', po:'parts_manage',
  staff:'staff_manage', accounts:'staff_manage', settings:'settings'
};
function routeAllowed(view){ var c=VIEW_CAP[view]; return !c || can(c); }


/* ===== */

/* ============================================================================
   PART 13 — Parts reference catalog (read-only SKU lookup).
   Loads the login-protected, compressed catalog docs from Firestore
   (collection "catalog"), decompresses them in the browser, and builds an
   in-memory SKU -> {name, net, srp} index. Preloaded after sign-in so the
   line-editor lookup is instant. Never touches stock (SQL is the source).
   ========================================================================== */

var CATALOG = null;          /* { sku: [name, net, srp] } */
var CATALOG_STATE = 'idle';  /* idle | loading | ready | error */
var CATALOG_META = null;

async function gunzipB64(b64){
  var bytes = Uint8Array.from(atob(b64), function(c){ return c.charCodeAt(0); });
  if (typeof DecompressionStream!=='undefined'){
    var stream = new Blob([bytes]).stream().pipeThrough(new DecompressionStream('gzip'));
    return await new Response(stream).text();
  }
  // very old browser fallback: no decompression available
  throw new Error('gzip not supported in this browser');
}

async function loadCatalog(force){
  if (typeof FB==='undefined' || !FB.ready || !FB.user) return;
  if (CATALOG_STATE==='loading') return;
  if (CATALOG_STATE==='ready' && !force) return;
  CATALOG_STATE='loading';
  try {
    var meta = await FB.db.collection('catalog').doc('_meta').get();
    if (!meta.exists){ CATALOG={}; CATALOG_STATE='ready'; return; }
    CATALOG_META = meta.data();
    var map = {};
    for (var i=0; i<CATALOG_META.chunks; i++){
      var d = await FB.db.collection('catalog').doc('chunk_'+i).get();
      if (!d.exists) continue;
      var arr = JSON.parse(await gunzipB64(d.data().data));
      for (var k=0;k<arr.length;k++){ var r=arr[k]; map[String(r[0])] = [r[1], r[2], r[3]]; }
    }
    CATALOG = map; CATALOG_STATE='ready';
    if (typeof console!=='undefined') console.log('Parts catalog ready: '+Object.keys(map).length+' SKUs (v'+CATALOG_META.version+')');
    // refresh the SKU hint if a line modal is open
    if (typeof document!=='undefined'){ var m=document.getElementById('skuMsg'); if(m && typeof catalogHint==='function') m.textContent=catalogHint(); }
  } catch(e){
    if (typeof console!=='undefined') console.error('catalog load failed', e);
    CATALOG_STATE='error';
  }
}

function catalogLookup(sku){
  if (!CATALOG) return null;
  var r = CATALOG[String(sku).trim()];
  return r ? { name:r[0], net:r[1], srp:r[2] } : null;
}
function catalogCount(){ return CATALOG ? Object.keys(CATALOG).length : 0; }
